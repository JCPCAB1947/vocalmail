<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VocalMail</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
html,body { width:100%; height:100%; background:#000; color:#fff;
            font-family:-apple-system,sans-serif; overflow:hidden; }

#startbtn {
  position:fixed; inset:0; width:100%; height:100%;
  background:#000; color:#fff; border:none; cursor:pointer;
  font-size:52px; font-weight:bold; z-index:999;
  display:flex; align-items:center; justify-content:center;
}
#circle {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-60%);
  width:180px; height:180px; border-radius:50%;
  background:#fff; align-items:center; justify-content:center;
  display:none;
}
#circle.pulse { display:flex; animation:pulse 1.5s infinite; }
#circle svg { width:80px; height:80px; fill:#000; }
@keyframes pulse {
  0%,100% { transform:translate(-50%,-60%) scale(1); opacity:1; }
  50%      { transform:translate(-50%,-60%) scale(1.08); opacity:.85; }
}
#version {
  position:fixed; bottom:24px; left:0; right:0;
  text-align:center; color:#555; font-family:monospace; font-size:14px;
}
#transcript {
  position:fixed; bottom:50px; left:0; right:0; text-align:center;
  color:#7fdc7f; font-size:26px; padding:10px;
  pointer-events:none; z-index:100;
}
#transcript, #debug { display:none !important; }
#miclight { position:fixed; top:16px; left:16px; width:22px; height:22px;
  border-radius:50%; background:#e33; box-shadow:0 0 12px #e33; display:none; }
</style>
</head>
<body>

<button id="majbtn" style="position:fixed;top:12px;right:12px;z-index:10;
  background:#222;color:#aaa;border:1px solid #444;border-radius:10px;
  font-size:16px;padding:10px 16px;font-family:monospace;">MAJ</button>
<div id="version" style="position:fixed;bottom:8px;left:0;right:0;text-align:center;
  color:#555;font-family:monospace;font-size:14px;"></div>
<div id="miclight"></div>
<button id="startbtn">TOUCHER L'ÉCRAN</button>
<div id="circle">
  <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg>
</div>
<div id="transcript" style="display:none"></div>
<div id="debug" style="
  position:fixed; top:0; left:0; right:0;
  background:#fff; color:#000;
  font-size:36px; font-weight:bold; font-family:monospace;
  padding:10px; z-index:1000; text-align:center;
  line-height:1.4;
"></div>

<script>
/* ═══ VERSION UNIQUE — ne changer QUE cette ligne ═══ */
const VERSION = '12.6';
const DEBIT = 0.95;       /* debit normal */
const DEBIT_OBJET = 0.8;  /* plus lent pour les objets des messages */  /* vitesse de la voix : 1.0 = normal, 0.85 = posé, 0.7 = lent */

/* ================================================================
   VOCALMAIL (version : voir constante VERSION)
   ================================================================ */

const WORKER_URL = 'https://vocalmail-gmail.jc-penochetcab.workers.dev';
const _urlPin = new URLSearchParams(location.search).get('pin');
if (_urlPin) try { localStorage.setItem('vm_pin', _urlPin); } catch(e) {}
const PIN = _urlPin || (function(){ try { return localStorage.getItem('vm_pin')||''; } catch(e){ return ''; } })();

/* ── API Worker ─────────────────────────────────────────────────── */
async function api(path, method='GET', body=null) {
  const opts = { method, headers:{'X-Pin':PIN,'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(WORKER_URL+path, opts);
  const data = await res.json();
  if (!res.ok||data.error) throw new Error(data.error||'HTTP '+res.status);
  return data;
}

/* ── TTS ────────────────────────────────────────────────────────── */
let _q=[], _spk=false;
speechSynthesis.onvoiceschanged = () => { speechSynthesis.getVoices(); };

/* JC/jc/J-C/JCP -> prononce proprement, partout */
function fixTTS(t) {
  if (!t) return '';
  return t
    .replace(/\bJ\.?\s?-?\s?C\.?\s?P\.?(?![a-zà-ÿA-ZÀ-Ÿ])/gi, 'Ji Cé Pé')
    .replace(/\bJ\.?\s?-?\s?C\.?(?![a-zà-ÿA-ZÀ-Ÿ])/gi, 'Ji Cé');
}

let _lastSpoken = '', _ttsEnd = 0;

function speak(txt, then, rate) {
  txt = fixTTS(txt);
  _lastSpoken = txt;
  if (!txt) { if(then) then(); return; }
  _q.push({txt,then,rate});
  if (!_spk) _flush();
}

function _flush() {
  if (!_q.length) {
    _spk=false; S.talking=false; _ttsEnd = Date.now();
    /* file vide : la voix a fini -> ROUVRIR le micro apres 700 ms
       (la fin reelle du son traine apres l'evenement de fin sur iPhone) */
    setTimeout(startRec, 700);
    updateDebug();
    return;
  }
  _spk=true; S.talking=true;
  updateDebug(); /* rafraichir le voyant DES que la voix demarre */
  stopRec(); /* iOS : micro FERME pendant la parole, sinon voix muette/etouffee */
  const {txt,then,rate} = _q.shift();
  const u = new SpeechSynthesisUtterance(txt);
  u.lang='fr-FR'; u.rate=rate||DEBIT; u.volume=1;
  u.onend  = () => { _spk=false; _ttsEnd = Date.now(); if(then) then(); _flush(); }; /* talking reste vrai tant que la file n'est pas vide */
  u.onerror = () => { _spk=false; if(then) then(); _flush(); };
  /* 250 ms pour que le micro soit vraiment ferme (anti-sourdine iOS),
     la PREMIERE phrase part immediatement (deverrouillage deja fait dans le geste) */
  if (!window._ttsWarm) { window._ttsWarm = true; speechSynthesis.speak(u); }
  else setTimeout(() => speechSynthesis.speak(u), 250);
}

function stopRec() {
  if (rec && recOn) { try { rec.stop(); } catch(e){} }
}

function startRec() {
  if (rec && !recOn && !S.talking && !_spk && !_q.length && S.micOn && started) {
    try { rec.start(); } catch(e){}
  }
}

function stopTTS() {
  _q=[]; speechSynthesis.cancel(); _spk=false; S.talking=false;
  _ttsEnd = Date.now();
  setTimeout(startRec, 400);
  updateDebug();
}

document.addEventListener('DOMContentLoaded', () => {
  const maj = document.getElementById('majbtn');
  if (maj) maj.addEventListener('click', e => {
    e.stopPropagation();
    const u = new URL(location.href);
    u.searchParams.set('r', Date.now()); /* numero unique -> copie fraiche */
    location.replace(u);
  });
  const v = document.getElementById('version');
  if (v) v.textContent = 'v' + VERSION;
});

function updateDebug() {
  const el = document.getElementById('debug');
  if (el) el.textContent = 'v' + VERSION + ' | screen:'+S.screen+' | voix:'+(S.talking?'PARLE':'muette')+' | micro:'+(recOn?'OUVERT':'fermé');
  /* Voyant rouge : allume quand le micro ecoute reellement */
  const ml = document.getElementById('miclight');
  if (ml) ml.style.display = recOn ? 'block' : 'none';
}

/* ── Bip — un seul bip par commande finale ──────────────────────── */
let _actx=null;
function initAudio() {
  /* a appeler DANS le geste du tap (regle iOS) */
  try {
    if (!_actx) _actx = new (window.AudioContext||window.webkitAudioContext)();
    if (_actx.state==='suspended') _actx.resume();
  } catch(e){}
}
function beep() {
  try {
    if (!_actx) return; /* jamais cree hors geste : c'est lui qui tuait la dictee */
    if (_actx.state==='suspended') _actx.resume();
    const o=_actx.createOscillator(), g=_actx.createGain();
    o.connect(g); g.connect(_actx.destination);
    o.frequency.value=880; g.gain.value=0.3;
    o.start(); o.stop(_actx.currentTime+0.12);
  } catch(e){}
}

/* ── État global ────────────────────────────────────────────────── */
let rec=null, recOn=false, started=false;
const S = {
  screen:'IDLE', emails:[], idx:0, userName:'',
  compose:{to:'',toAddr:'',subject:'',body:''},
  talking:false, micOn:false, searchQ:'', micWarned:false
};

/* ── Helpers ────────────────────────────────────────────────────── */
const ORD=['premier','deuxième','troisième','quatrième','cinquième',
           'sixième','septième','huitième','neuvième','dixième'];
const ord = n => ORD[n-1]||String(n);

function dateFR(iso) {
  const d=new Date(iso);
  const j=['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'][d.getDay()];
  const m=['janvier','février','mars','avril','mai','juin','juillet','août',
           'septembre','octobre','novembre','décembre'][d.getMonth()];
  return `${j} ${d.getDate()} ${m}`;
}

function dedupSubject(s) {
  return s.replace(/^(re|fwd?|tr)\s*:\s*/gi,'').trim();
}

function cutPoliteness(t) {
  const m = t.match(/((?:bien |très |tres )?cordialement|amicalement|bien à (?:vous|toi)|sincères salutations|sinceres salutations|respectueusement|amitiés|amities|(?:grosses? )?bises?|(?:gros )?bisous?|je (?:t'|vous )embrasse|à bientôt|a bientot)/i);
  return m ? t.slice(0, m.index + m[0].length) : t;
}

function cleanTxt(t) {
  return t
    .replace(/<[^>]+>/g,' ')                        /* balises HTML */
    .replace(/https?:\/\/\S+/gi, ' lien ')          /* adresses web */
    .replace(/\S+@\S+\.\S+/g, ' adresse mail ')    /* adresses e-mail */
    .replace(/(?:\d[\s.\-\/]?){8,}\d/g, ' numéro ') /* telephones, codes, references */
    .replace(/\s+/g,' ').trim();
}

/* ── Correspondance commandes vocales ───────────────────────────── */
function N(t){ return t.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }

function is(t, key) {
  const v = N(t);
  const map = {
    'SUIVANT'  : ['suivant','prochain','next'],
    'PRECEDENT': ['precedent','avant','retour','arriere'],
    'LIRE'     : ['lire','lis','ecouter','ouvrir','ouvre'],
    'REPONDRE' : ['repondre','reponse','reply'],
    'MENU'     : ['menu','accueil','home'],
    'ECRIRE'   : ['ecrire','nouveau','composer','rediger'],
    'CHERCHER' : ['chercher','cherche','rechercher','recherche'],
    'ENVOYER'  : ['envoyer','envoie','send','confirmer'],
    'ANNULER'  : ['annuler','annule','cancel','abandonner'],
    'OUI'      : ['oui','yes','ok','affirmatif','correct','vas-y'],
    'NON'      : ['non','no','negatif'],
    'AIDE'     : ['aide','help','commandes'],
    'ANCIENS'  : ['anciens','deja lus','lus'],
    'QUITTER'  : ['quitter','quitte','au revoir','fermer','fin de session','arrete tout'],
  };
  return (map[key]||[key.toLowerCase()]).some(k => v.includes(k));
}

/* ── Lecture emails ─────────────────────────────────────────────── */
function speakEmail(e) {
  const from = e.from_name||e.from_addr||'inconnu';
  const subj = dedupSubject(e.subject||'sans objet');
  const date = dateFR(e.date);
  const body = cutPoliteness(cleanTxt(e.body||e.snippet||'')).substring(0,500);
  speak(`De ${from}. ${date}. ${subj}. ${body}`);
}

/* ── Écrans ─────────────────────────────────────────────────────── */
function goGoodbye() {
  S.micOn = false; stopRec(); 
  _q=[]; speechSynthesis.cancel(); _spk=false; S.talking=false;
  const u = new SpeechSynthesisUtterance('Au revoir. À bientôt.');
  u.lang='fr-FR'; u.rate=DEBIT;
  u.onend = () => {
    try { window.close(); } catch(e) {}
    try { location.href = 'about:blank'; } catch(e) {}
  };
  speechSynthesis.speak(u);
}

function goMenu() {
  S.screen='MENU'; updateDebug();
  speak('Voulez-vous lire, écrire, ou rechercher un mail ?');
}

function goLoadEmails(q) {
  S.screen='NAV'; updateDebug();
  api('/list?max=100&q='+encodeURIComponent(q||'is:unread')).then(r=>{
    S.loadTries = 0;
    S.emails=r.emails||[]; S.idx=0;
    if (!S.emails.length) { speak('Vous n’avez aucun message non lu.', goMenu); return; }
    const n=S.emails.length;
    speak(`Vous avez ${n} message${n>1?'s':''} non lu${n>1?'s':''}.`);
    annHeader(true);
  }).catch(()=>{
    S.loadTries = (S.loadTries||0) + 1;
    if (S.loadTries <= 2) {
      speak('Erreur de chargement. Nouvelle tentative.');
      setTimeout(()=>goLoadEmails(q), 2500);
    } else {
      S.loadTries = 0;
      S.screen = 'ERROR';
      speak('Le serveur ne répond pas. Touchez l’écran pour réessayer.');
    }
  });
}

/* ── Navigation un message a la fois ────────────────────────────── */
function annHeader(first) {
  const e=S.emails[S.idx];
  const from=e.from_name||e.from_addr||'expéditeur inconnu';
  const subj=dedupSubject(e.subject||'sans objet');
  if (first) {
    speak(`Le message le plus récent a été envoyé par ${from}, le ${dateFR(e.date)}, et concerne : ${subj}.`, null, DEBIT_OBJET);
    speak('Toucher l’écran une fois pour arrêter la lecture.');
    speak('Voulez-vous lire ce message, passer au suivant, ou répondre ? Dites LIRE, SUIVANT, RÉPONDRE, ou AIDE, à tout moment.');
  } else {
    speak(`Objet : ${subj}.`, null, DEBIT_OBJET);
    navQuestion();
  }
}

function navQuestion() {
  speak(S.idx===0 ? 'Dites LIRE, ou SUIVANT.'
                  : 'Dites LIRE, SUIVANT, ou PRÉCÉDENT.');
}

function goReadBody() {
  S.screen='NAV';
  const e=S.emails[S.idx];
  api('/read?id='+encodeURIComponent(e.id)).then(d=>{
    const corps = cutPoliteness(cleanTxt(d.body||e.snippet||'Message vide.'));
    speak(corps);
    navQuestion();
  }).catch(()=>{
    /* secours : au moins l'aperçu */
    speak(cutPoliteness(cleanTxt(e.snippet||'Message indisponible.')));
    navQuestion();
  });
}

function goLast() {
  if (!S.emails.length) return;
  S.idx=S.emails.length-1;
  speak('Dernier message.');
  annHeader(false);
}

function goHelp() {
  S.helping=true;
  const parts=[
    'Toucher l’écran une fois arrête la lecture.',
    'Dites SUIVANT, pour lire l’objet du message suivant.',
    'PRÉCÉDENT, pour revenir en arrière.',
    'LIRE, pour lire le contenu du message.',
    'RÉPONDRE, pour répondre au message courant.',
    'Ou bien, balayez l’écran. Vers la droite, pour le suivant. Vers la gauche, pour le précédent. Vers le haut, pour revenir à l’accueil. Vers le bas, pour atteindre le dernier message.',
    'Dites QUITTER, ou touchez deux fois l’écran, pour quitter VocalMail.',
  ];
  let i=0;
  const next=()=>{
    if (!S.helping) return;
    if (i>=parts.length) { S.helping=false; navQuestion(); return; }
    speak(parts[i++], ()=>setTimeout(next, 500));
  };
  next();
}



function goNextEmail() {
  if (S.idx < S.emails.length-1) { S.idx++; annHeader(false); }
  else { speak('C’était le dernier message.'); navQuestion(); }
}

function goPrevEmail() {
  if (S.idx > 0) { S.idx--; annHeader(false); }
  else { speak('Vous êtes au message le plus récent.'); navQuestion(); }
}



function goReply() {
  S.compose = {
    to: S.emails[S.idx].from_name||'',
    toAddr: S.emails[S.idx].from_addr||'',
    subject: 'Re: '+(S.emails[S.idx].subject||''),
    body:''
  };
  S.screen='COMPOSE_BODY';
  speak(`Réponse à ${S.compose.to}. Dictez votre message.`);
}

function goComposeRecipient() {
  S.screen='COMPOSE_RECIP';
  speak('À qui voulez-vous écrire ?');
}

function goComposeConfirm() {
  S.screen='COMPOSE_CONFIRM';
  speak(`Je vais envoyer à ${S.compose.to} : ${S.compose.subject}. ${S.compose.body}. Confirmer ?`);
}

async function doSend() {
  S.screen='IDLE';
  speak('Envoi en cours...', async () => {
    try {
      await api('/send','POST',{
        to: S.compose.toAddr||S.compose.to,
        subject: S.compose.subject,
        body: S.compose.body
      });
      speak('Mail envoyé.', goMenu);
    } catch(e) { speak("Erreur d'envoi.", goMenu); }
  });
}

function goSearchQ() {
  S.screen='SEARCH_Q';
  speak('Que voulez-vous rechercher ?');
}

/* ── Interprétation commandes — uniquement résultats finals ─────── */
function isExact(t, key) {
  const v = N(t);
  const map = { SUIVANT:['suivant','le suivant','la suite','prochain'],
                PRECEDENT:['precedent','le precedent','en arriere'],
                LIRE:['lire','lecture'], ANCIENS:['anciens','anciens messages','ancien'],
                ECRIRE:['ecrire','envoyer'], CHERCHER:['chercher','rechercher','recherche'],
                REPONDRE:['repondre','reponse'], MENU:['menu','retour','stop'],
                OUI:['oui'], NON:['non'], ANNULER:['annuler'] };
  return (map[key]||[]).some(k => v === k);
}

function onUtterance(t) {
  if (!t) return;
  /* ANTI-ECHO :
     a) plusieurs commandes dans un enonce = echo d'une question -> jete
     b) fragment de la derniere phrase, dans les 1,5s apres la voix -> jete,
        sauf commande exacte d'un mot (reponse rapide legitime) */
  {
    const _keys = ['SUIVANT','PRECEDENT','LIRE','ECRIRE','CHERCHER','REPONDRE','ANCIENS'];
    let _hits = 0;
    for (const k of _keys) if (is(t, k)) _hits++;
    if (_hits >= 2) return; /* plusieurs commandes = echo d'une question */
    const _nt = N(t);
    const _dt = Date.now() - _ttsEnd;
    const _inPrompt = _nt.length > 2 && N(_lastSpoken).includes(_nt);
    const _core = _keys.concat(['MENU','OUI','NON','ANNULER']).some(k => isExact(t, k));
    /* Un mot present dans la phrase que la voix vient de dire :
       - commande exacte -> echo si < 1,3 s (une vraie reponse humaine arrive apres)
       - autre fragment  -> echo si < 2 s */
    if (_inPrompt && (_core ? _dt < 1300 : (_nt.length > 5 && _dt < 2000))) return;
  }
  /* Ne pas traiter si la TTS parle encore */
  if (S.talking) return;

  document.getElementById('transcript').textContent = t;
  /* Pas de bip pendant la dictee : il perturbait le micro iPhone (lecon v9) */
  if (S.screen !== 'COMPOSE_BODY') beep();

  if (is(t,'QUITTER') && S.screen!=='COMPOSE_BODY') return goGoodbye();
  const sc = S.screen;

  if (is(t,'MENU')) { stopTTS(); goMenu(); return; }
  if (is(t,'AIDE')) { stopTTS(); goHelp(); return; }

  if (sc==='MENU') {
    if (is(t,'LIRE'))     { goLoadEmails('is:unread'); return; }
    if (is(t,'ANCIENS'))  { goLoadEmails('is:read');   return; }
    if (is(t,'ECRIRE'))   { goComposeRecipient();      return; }
    if (is(t,'CHERCHER')) { goSearchQ();               return; }
    speak('Dites lire, écrire, ou rechercher.');
    return;
  }

  if (sc==='NAV') {
    if (is(t,'LIRE'))      { goReadBody();  return; }
    if (is(t,'SUIVANT'))   { goNextEmail(); return; }
    if (is(t,'PRECEDENT')) { goPrevEmail(); return; }
    if (is(t,'REPONDRE'))  { goReply();     return; }
    if (is(t,'ECRIRE'))    { goComposeRecipient(); return; }
    if (is(t,'CHERCHER'))  { goSearchQ();   return; }
    return; /* silence si commande inconnue */
  }

  if (sc==='COMPOSE_RECIP') {
    S.compose.to=t; S.compose.toAddr=t;
    S.screen='COMPOSE_SUBJ';
    speak(`Destinataire : ${t}. Quel est le sujet ?`);
    return;
  }

  if (sc==='COMPOSE_SUBJ') {
    S.compose.subject=t;
    S.screen='COMPOSE_BODY';
    speak(`Sujet : ${t}. Dictez votre message.`);
    return;
  }

  if (sc==='COMPOSE_BODY') {
    if (is(t,'ANNULER')) { speak('Mail annulé.', goMenu); return; }
    S.compose.body=t;
    goComposeConfirm();
    return;
  }

  if (sc==='COMPOSE_CONFIRM') {
    if (is(t,'OUI')||is(t,'ENVOYER')) { doSend(); return; }
    if (is(t,'NON')||is(t,'ANNULER')) { speak('Mail annulé.', goMenu); return; }
    speak('Dites oui ou non.');
    return;
  }

  if (sc==='SEARCH_Q') {
    S.searchQ=t;
    speak(`Recherche : ${t}.`, () => goLoadEmails(t));
    return;
  }
}

/* ── Réveil : iOS gèle la page en arrière-plan ; remise en état propre ── */
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && started) {
    try { if (_actx && _actx.state === 'suspended') _actx.resume(); } catch(e){}
    try { speechSynthesis.cancel(); } catch(e){}
    _q=[]; _spk=false; S.talking=false;
    setTimeout(startRec, 500);
    updateDebug();
  }
});

/* ── Gestes ─────────────────────────────────────────────────────── */
let _tx=0, _ty=0, _swiped=false;
document.body.addEventListener('touchstart', e=>{
  if (!started) return;
  _tx=e.touches[0].clientX; _ty=e.touches[0].clientY; _swiped=false;
},{passive:true});

document.body.addEventListener('touchend', e=>{
  if (!started) return;
  const dx=e.changedTouches[0].clientX-_tx;
  const dy=e.changedTouches[0].clientY-_ty;
  const ax=Math.abs(dx), ay=Math.abs(dy);
  if (ax<40&&ay<40) return;
  _swiped=true;
  S.helping=false;
  stopTTS();
  if (ay>ax) {
    if (dy<0) goLoadEmails('is:unread'); /* HAUT : accueil complet */
    else goLast();                        /* BAS : dernier message */
  } else if (S.emails.length) {
    if (dx>0) goNextEmail(); else goPrevEmail();
  }
},{passive:true});

let _tapN=0, _tapT=null;
document.body.addEventListener('click', e=>{
  if (!started||_swiped||e.target.id==='startbtn'||e.target.id==='majbtn') return;
  _swiped=false;
  _tapN++; clearTimeout(_tapT);
  _tapT=setTimeout(()=>{
    const n=_tapN; _tapN=0;
    if (n>=2) { goGoodbye(); return; }             /* toucher DEUX fois = quitter */
    if (S.screen==='ERROR') { goLoadEmails('is:unread'); return; } /* toucher = reessayer */
    if (S.screen.indexOf('COMPOSE')===0) return;   /* pas de tap parasite en dictee */
    S.helping=false;                               /* toucher UNE fois = arreter la lecture */
    stopTTS();
    navQuestion();
  }, 380);
});

/* ── Démarrage — recette mictest3 ───────────────────────────────── */
document.getElementById('startbtn').addEventListener('click', ()=>{
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  if (!SR) { alert('Reconnaissance vocale non supportée'); return; }

  /* Deverrouillages DANS le geste (regles iOS) :
     - synthese vocale : enonciation muette synchrone
     - generateur du bip : contexte audio cree ici */
  try {
    const u0 = new SpeechSynthesisUtterance(' ');
    u0.volume = 0;
    speechSynthesis.speak(u0);
  } catch(e) {}
  initAudio();

  rec = new SR();
  rec.lang = 'fr-FR';
  rec.continuous = true;
  rec.interimResults = true;   /* true pour garder le micro actif */
  rec.maxAlternatives = 1;

  rec.onstart = ()=>{
    recOn=true;
    updateDebug();
    /* Le micro rouvre a CHAQUE alternance voix/micro :
       le demarrage ne doit s'executer qu'a la PREMIERE ouverture */
    if (started) return;
    document.getElementById('startbtn').style.display='none';
    document.getElementById('circle').classList.add('pulse');
    started=true; S.micOn=true;

    if (!PIN) { speak("Code d'accès manquant."); return; }

    updateDebug();
    speak('Démarrage de VocalMail, version ' + VERSION.split('.').join(' ') + '.', ()=>{
      api('/ping').then(p=>{
        S.userName=p.account_name||p.email||'';
        goLoadEmails('is:unread');
      }).catch(()=>{ speak('Erreur de connexion.', goMenu); });
    });
  };

  rec.onend = ()=>{
    recOn=false;
    updateDebug();
    /* Relancer SEULEMENT si la voix ne parle pas (alternance stricte) */
    if (S.micOn && started && !S.talking) setTimeout(startRec, 300);
  };

  rec.onerror = e=>{
    updateDebug();
    /* silences normaux : pas de parole, ou coupure volontaire (alternance voix/micro) */
    if (e.error==='no-speech' || e.error==='aborted') return;
    if (e.error==='not-allowed' || e.error==='service-not-allowed') {
      if (!S.micWarned) {
        S.micWarned=true;
        speak(e.error==='service-not-allowed'
          ? 'Le service de reconnaissance est refusé. Vérifie le mode ordinateur de Safari et recharge la page.'
          : 'Le micro est refusé. Autorise le micro pour ce site dans Safari.');
      }
      return;
    }
  };

  /* Uniquement les résultats FINALS → un seul bip, pas de bips en rafale */
  rec.onresult = e=>{
    const result = e.results[e.results.length-1];
    if (!result.isFinal) return; /* ignorer les intermédiaires */
    const t = result[0].transcript.trim().replace(/pinochet/gi, 'Pénochet');
    document.getElementById('transcript').textContent = t;
    updateDebug();
    if (t) onUtterance(t);
  };

  try { rec.start(); } catch(ex){ alert('Erreur micro : '+ex.message); }
});
</script>
