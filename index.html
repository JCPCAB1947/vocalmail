<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VocalMail v7.1</title>
<style>
:root {
  --bg: #07091C;
  --s1: #0F1525;
  --s2: #172034;
  --b1: #1E2D4A;
  --b2: #2D4169;
  --cyan: #38BDF8;
  --cyan-dim: rgba(56,189,248,.12);
  --amber: #F59E0B;
  --amber-dim: rgba(245,158,11,.12);
  --purple: #A855F7;
  --green: #10B981;
  --red: #EF4444;
  --text: #E2E8F0;
  --muted: #64748B;
  --font: system-ui, -apple-system, 'Segoe UI', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);color:var(--text);
  font-family:var(--font);min-height:100vh;
  display:flex;align-items:flex-start;justify-content:center;
  padding:28px 16px 48px;
}
#app{width:100%;max-width:580px;display:flex;flex-direction:column;align-items:center;gap:22px;}

/* Header */
.hdr{display:flex;align-items:center;gap:10px;width:100%;}
.logo{font-size:20px;font-weight:700;letter-spacing:-.3px;}
.ver{background:var(--b1);border-radius:6px;font-size:11px;color:var(--muted);
     padding:2px 8px;font-weight:600;font-family:monospace;}

/* Ring — signature element */
.ring-wrap{position:relative;width:148px;height:148px;margin:4px 0;}
.ring{
  width:148px;height:148px;border-radius:50%;
  border:3px solid var(--b1);
  display:flex;align-items:center;justify-content:center;
  font-size:54px;transition:border-color .3s,box-shadow .3s;
  will-change:transform;
}
.ring.listen{border-color:var(--cyan);box-shadow:0 0 0 10px var(--cyan-dim),0 0 32px rgba(56,189,248,.35);animation:beat 2s ease-in-out infinite;}
.ring.speak{border-color:var(--amber);box-shadow:0 0 0 10px var(--amber-dim),0 0 32px rgba(245,158,11,.35);animation:beat-a .9s ease-in-out infinite;}
.ring.load{border-color:var(--purple);box-shadow:0 0 28px rgba(168,85,247,.4);animation:spin 1.1s linear infinite;}
.ring.ok{border-color:var(--green);box-shadow:0 0 28px rgba(16,185,129,.4);}
.ring.err{border-color:var(--red);box-shadow:0 0 28px rgba(239,68,68,.4);animation:shake .4s ease;}
@keyframes beat{0%,100%{box-shadow:0 0 0 8px var(--cyan-dim),0 0 20px rgba(56,189,248,.25);}50%{box-shadow:0 0 0 16px rgba(56,189,248,.16),0 0 44px rgba(56,189,248,.45);}}
@keyframes beat-a{0%,100%{box-shadow:0 0 0 8px var(--amber-dim),0 0 20px rgba(245,158,11,.25);}50%{box-shadow:0 0 0 16px rgba(245,158,11,.16),0 0 44px rgba(245,158,11,.45);}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-7px);}75%{transform:translateX(7px);}}

/* State label */
.slabel{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}

/* Panel */
.panel{
  width:100%;background:var(--s1);
  border:1px solid var(--b1);border-radius:16px;
  padding:20px 22px;min-height:128px;
}
.panel .ptag{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--cyan);margin-bottom:10px;}
.panel .pbody{font-size:17px;line-height:1.68;}

/* Email rows */
.erow{display:flex;gap:14px;padding:9px 0;border-bottom:1px solid var(--b1);}
.erow:last-child{border-bottom:none;}
.enum{color:var(--cyan);font-weight:700;font-size:18px;min-width:26px;flex-shrink:0;line-height:1.4;}
.einfo{flex:1;min-width:0;}
.efrom{font-weight:500;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.esubj{color:var(--muted);font-size:13px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* Transcript bar */
.tbar{
  width:100%;background:var(--s1);border:1px solid var(--b1);
  border-radius:12px;padding:12px 16px;
  display:flex;align-items:center;gap:10px;
  font-size:14px;color:var(--muted);min-height:48px;
}
.tbar .tico{font-size:17px;flex-shrink:0;}
#ttext{font-style:italic;flex:1;}

/* Mic button */
.micbtn{
  background:var(--s1);border:1.5px solid var(--b1);border-radius:100px;
  color:var(--text);font-size:15px;font-family:var(--font);
  padding:12px 28px;cursor:pointer;transition:border-color .2s,color .2s;
  display:flex;align-items:center;gap:9px;
}
.micbtn:hover{border-color:var(--cyan);color:var(--cyan);}
.micbtn.on{background:var(--cyan-dim);border-color:var(--cyan);color:var(--cyan);}

/* Log */
.logbox{
  width:100%;font-size:10px;color:var(--muted);font-family:monospace;
  max-height:64px;overflow-y:auto;border-top:1px solid var(--b1);padding-top:8px;
}
.logbox div{padding:1px 0;}

/* Help text */
.help{font-size:12px;color:var(--muted);text-align:center;line-height:1.5;}
</style>
</head>
<body>
<div id="app">

  <div class="hdr">
    <div class="logo">VocalMail</div>
    <div class="ver">v7.1</div>
  </div>

  <div class="ring-wrap">
    <div class="ring" id="ring">🎙️</div>
  </div>

  <div class="slabel" id="slabel">Prêt — appuyez sur Espace ou sur Activer</div>

  <div class="panel" id="panel">
    <div class="ptag">Bienvenue</div>
    <div class="pbody">Appuyez sur <strong>Activer</strong> ou sur la touche <strong>Espace</strong> pour démarrer VocalMail.</div>
  </div>

  <div class="tbar">
    <span class="tico">🎤</span>
    <span id="ttext">En attente…</span>
  </div>

  <button class="micbtn" id="micbtn" onclick="toggleMic()">
    🎙️ Activer le microphone
  </button>

  <div class="help">
    Espace = activer/désactiver · Chrome recommandé pour la reconnaissance vocale
  </div>

  <div class="logbox" id="logbox"></div>
</div>

<script>
/* =================================================================
   V O C A L M A I L  v7.1
   Messagerie vocale pour personnes aveugles
   Commandes vocales : LIRE · ÉCRIRE · CHERCHER
   Synonymes larges, répétition si incompris, URLs nettoyées
   ================================================================= */

const GMAIL_MCP = 'https://gmailmcp.googleapis.com/mcp/v1';
const API_URL   = 'https://api.anthropic.com/v1/messages';
const MODEL     = 'claude-sonnet-4-6';

/* ── Normalisation ─────────────────────────────────────────── */
function N(t){
  return(t||'').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
}

/* ── Tables d'intentions ───────────────────────────────────── */
const I={
  LIRE:     ['lire','lecture','mes mails','les mails','mes messages','voir mes mails',
             'boite de reception','nouveaux mails','mails recus','ecouter mes mails','courrier'],
  ECRIRE:   ['ecrire','nouveau mail','envoyer un mail','composer','rediger','faire un mail',
             'un nouveau message','envoyer','envoie'],
  CHERCHER: ['chercher','cherche','recherche','trouver','retrouve','find',
             'cherche le mail de','trouve le mail de','cherche les mails de'],
  QUITTER:  ['quitter','quitte','au revoir','fermer','bye','au revoir','sortir','stop vocalmail'],

  OUI:      ['oui','vas y','envoie','d accord','ok','confirme','c est bon','parfait',
             'yes','affirmatif','bien sur','absolument','allez','c est parti','go'],
  NON:      ['non','annule','annuler','pas maintenant','attends','stop d envoi','surtout pas',
             'cancel','laisse tomber','abandonne','non merci'],

  SUITE:    ['la suite','continue','suivant','encore','poursuis','prochain',
             'mail suivant','apres','le suivant','suivante','passe au suivant'],
  ANCIENS:  ['anciens','les anciens','deja lus','vieux','anciens mails','mails lus','precedents'],
  RETOUR:   ['retour','revenir','menu','menu principal','aller au menu','revenir au menu'],
  REPONDRE: ['repondre','reponse','reponds','repondre a ce mail','replique'],

  SES_MAILS:  ['ses mails','les mails de','lire ses mails','ecouter ses mails','les siens',
               'voir ses mails','courrier de','mails de cette personne','mails recus de'],
  LUI_ECRIRE: ['lui ecrire','ecrire a','un mail pour','envoyer a','lui envoyer un mail',
               'faire un mail pour','rediger pour','contacter','lui faire un mail'],
  SON_ADRESSE:['son adresse','l adresse','son mail','adresse mail','epelle','epeler',
               'quelle adresse','quelle est son adresse','orthographe adresse'],

  TERMINER: ['termine','fin du message','point final','j ai fini','c est fini',
             'fin','c est tout','voila','fin de mail','message termine','j ai termine','fini'],
  STOP:     ['stop','arrete','interromps','saute','passer','sauter','assez','interrompe',
             'arreter la lecture','passe','coupe'],
  REESSAYER:['reessayer','essayer encore','retry','recommencer','retenter'],
};

function is(t,k){ const nt=N(t); return (I[k]||[]).some(p=>nt.includes(N(p))); }

function extractNum(t){
  const nt=N(t);
  const w={'un':1,'premier':1,'premiere':1,'one':1,
           'deux':2,'deuxieme':2,'second':2,'two':2,
           'trois':3,'troisieme':3,'three':3,
           'quatre':4,'quatrieme':4,'four':4,
           'cinq':5,'cinquieme':5,'five':5,
           'six':6,'sixieme':6,'seven':7,'sept':7,
           'huit':8,'huitieme':8,'neuf':9,'neuvieme':9,'dix':10};
  const m=nt.match(/\b([1-9]|10)\b/);
  if(m) return+m[1];
  for(const[k,v] of Object.entries(w)) if(nt.includes(k)) return v;
  return null;
}

/* ── Nettoyage email ───────────────────────────────────────── */
function cleanEmail(txt){
  if(!txt) return '';
  txt=txt.replace(/<[^>]+>/g,' ');                          // HTML
  txt=txt.replace(/https?:\/\/\S+/g,'(lien)');             // URLs http
  txt=txt.replace(/www\.\S+/g,'(lien)');                   // URLs www
  txt=txt.replace(/\S+@\S+\.\S+/g,'(adresse e-mail)');    // emails
  const ab=[
    [/\bM\. /g,'Monsieur '],[/\bMme\b/g,'Madame'],[/\bMlle\b/g,'Mademoiselle'],
    [/\bDr\b/g,'Docteur'],[/\bPr\b/g,'Professeur'],[/\betc\./g,'et cetera'],
    [/\btél\./g,'téléphone'],[/\bsvp\b/gi,"s'il vous plaît"],
    [/\bcdt\b/gi,'cordialement'],[/\brdv\b/gi,'rendez-vous'],
    [/\bBiz\b/g,'Bises'],[/\bp\.s\./gi,'post-scriptum'],
  ];
  for(const[r,s] of ab) txt=txt.replace(r,s);
  return txt.replace(/\s+/g,' ').trim();
}

/* ── Épellation d'adresse ──────────────────────────────────── */
function spellAddr(e){
  if(!e) return 'adresse inconnue';
  return[...e].map(c=>({'@':'arobase','.':'point','-':'tiret','_':'tiret bas'}[c]||c)).join(' ');
}

/* ── Ordinaux ──────────────────────────────────────────────── */
const ORD=['premier','deuxième','troisième','quatrième','cinquième',
           'sixième','septième','huitième','neuvième','dixième'];
const ord=n=>ORD[n-1]||String(n);

/* ── TTS queue ─────────────────────────────────────────────── */
let _q=[],_spk=false;
let _vx=[];
const loadVoices=()=>{_vx=speechSynthesis.getVoices();};
speechSynthesis.onvoiceschanged=loadVoices;
setTimeout(loadVoices,300);

function speak(txt,then){
  if(!txt) return;
  _q.push({txt,then});
  if(!_spk) _flush();
}

function _flush(){
  if(!_q.length){_spk=false;S.talking=false;ring('listen');return;}
  _spk=true;S.talking=true;ring('speak');
  const{txt,then}=_q.shift();
  const u=new SpeechSynthesisUtterance(txt);
  u.lang='fr-FR';u.rate=1.05;u.pitch=1.0;
  const fv=_vx.find(v=>v.lang.startsWith('fr')&&v.localService)
          ||_vx.find(v=>v.lang.startsWith('fr'));
  if(fv)u.voice=fv;
  u.onend=()=>{_spk=false;S.talking=false;if(then)then();_flush();};
  u.onerror=()=>{_spk=false;S.talking=false;_flush();};
  speechSynthesis.speak(u);
}

function stopTTS(){_q=[];speechSynthesis.cancel();_spk=false;S.talking=false;}

/* ── État global ───────────────────────────────────────────── */
let S={
  screen:'IDLE',
  emails:[],idx:0,mail:null,        // lecture
  contacts:[],                       // désambiguïsation
  compose:null,                      // rédaction
  confusion:0,                       // compteur d'incompréhensions
  micOn:false,
  talking:false,                     // TTS actif
};

/* ── Dispatch screens ──────────────────────────────────────── */
const DISPATCH={
  MAIN_MENU:         hMenu,
  EMAIL_LIST:        hList,
  SEARCH_RESULTS:    hList,
  READING_EMAIL:     hReading,
  EMAIL_ACTIONS:     hActions,
  COMPOSE_RECIPIENT: hRecipient,
  CONTACT_DISAMBIG:  hDisambig,
  CONTACT_OPTIONS:   hContactOpts,
  COMPOSE_SUBJECT:   hSubject,
  COMPOSE_BODY:      hBody,
  COMPOSE_CONFIRM:   hConfirm,
  SEARCH_QUERY:      hSearchQ,
  RETRY_SEND:        hRetrySend,
};

/* ── Reconnaissance vocale ─────────────────────────────────── */
let rec=null,recOn=false;

function initRec(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('Veuillez utiliser Chrome pour la reconnaissance vocale.');return false;}
  rec=new SR();
  rec.lang='fr-FR';rec.continuous=true;rec.interimResults=true;rec.maxAlternatives=3;
  rec.onstart=()=>{recOn=true;btnState(true);};
  rec.onend  =()=>{recOn=false;btnState(false);if(S.micOn)setTimeout(startRec,400);};
  rec.onerror=e=>{lg('Rec err: '+e.error);};
  rec.onresult=e=>{
    let fi='',interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      e.results[i].isFinal?(fi+=e.results[i][0].transcript):(interim+=e.results[i][0].transcript);
    }
    id('ttext').textContent=interim||fi||'…';
    if(fi.trim())onUtterance(fi.trim());
  };
  return true;
}

function startRec(){if(!recOn)try{rec.start();}catch(e){setTimeout(startRec,500);}}
function stopRec(){if(recOn)try{rec.stop();}catch(e){}}

function toggleMic(){
  if(S.micOn){
    S.micOn=false;stopRec();stopTTS();ring('idle');label('Microphone désactivé');
  } else {
    S.micOn=true;
    if(!rec&&!initRec())return;
    startRec();goWelcome();
  }
}

function btnState(on){
  const b=id('micbtn');
  b.textContent=on?'🔴 Microphone actif':'🎙️ Activer le microphone';
  b.className='micbtn'+(on?' on':'');
}

/* ── Dispatcher principal ──────────────────────────────────── */
function onUtterance(t){
  lg('⟫ '+t);
  id('ttext').textContent='« '+t+' »';

  // Pendant la lecture : seulement les interruptions
  if(S.talking&&S.screen==='READING_EMAIL'){
    if(is(t,'STOP')||is(t,'SUITE')||is(t,'RETOUR')){
      stopTTS();S.screen='EMAIL_ACTIONS';
      label('Actions disponibles');ring('listen');
      speak('Lecture interrompue. Dites RÉPONDRE, SUIVANT, ou MENU.');
    }
    return;
  }
  // Pendant TTS (hors lecture) : ignorer sauf commandes globales
  if(S.talking&&S.screen!=='COMPOSE_BODY') return;

  // Quitter (sauf pendant la dictée)
  if(is(t,'QUITTER')&&S.screen!=='COMPOSE_BODY') return goGoodbye();

  const h=DISPATCH[S.screen];
  if(h)h(t);
}

/* ── Gestionnaire de confusion ─────────────────────────────── */
function confused(repeatFn){
  S.confusion++;
  if(S.confusion>=3){
    S.confusion=0;stopTTS();
    speak("Je ne comprends toujours pas. Je reviens au menu principal.");
    setTimeout(goMenu,2200);
  } else {
    repeatFn();
  }
}

/* =============================================================
   É C R A N S
   ============================================================= */

/* WELCOME ───────────────────────────────────────────────────── */
function goWelcome(){
  S.screen='WELCOME';ring('speak');label('Bienvenue');
  panel('VocalMail','Chargement de votre messagerie…');
  speak(
    'Bonjour. Je suis VocalMail, votre messagerie vocale. '+
    'Dites LIRE pour écouter vos mails, ÉCRIRE pour en rédiger un nouveau, '+
    'ou CHERCHER pour retrouver un mail précis.',
    ()=>{S.screen='MAIN_MENU';label('Menu principal');}
  );
}

/* MENU PRINCIPAL ────────────────────────────────────────────── */
function goMenu(){
  S.screen='MAIN_MENU';S.confusion=0;
  label('Menu principal');
  panel('Menu principal','LIRE vos mails · ÉCRIRE un mail · CHERCHER un mail');
  if(!S.talking) speak('Dites LIRE, ÉCRIRE, ou CHERCHER.');
}

function hMenu(t){
  S.confusion=0;
  if(is(t,'LIRE'))   return goLoadEmails(false);
  if(is(t,'ECRIRE')) return goComposeRecipient();
  // "cherche le mail de X" : extraction directe
  if(is(t,'CHERCHER')||/cherche|recherche|trouve/i.test(t)){
    const m=N(t).match(/(?:cherche|trouve|retrouve|recherche).*?(?:le mail de|les mails de|de|mail)\s+(.+)/);
    return m?goSearch(m[1]):goSearchQ();
  }
  confused(()=>speak('Dites LIRE pour vos mails, ÉCRIRE pour composer un mail, ou CHERCHER pour retrouver un mail.'));
}

/* AU REVOIR ─────────────────────────────────────────────────── */
function goGoodbye(){
  S.screen='IDLE';S.micOn=false;stopRec();stopTTS();
  ring('idle');label('Au revoir');
  panel('Au revoir','VocalMail s\'est arrêté.\nAppuyez sur Activer pour relancer.');
  speak('Au revoir. À bientôt.');
}

/* =============================================================
   L E C T U R E
   ============================================================= */

async function goLoadEmails(older){
  S.screen='LOADING';ring('load');label('Chargement…');
  panel('Chargement','Connexion à Gmail en cours…');
  speak('Je cherche vos mails, un instant.');
  try{
    const raw=await api(
      'Tu es un assistant vocal pour personnes aveugles.\n'+
      `Utilise l'outil Gmail pour lister les ${older?'10 derniers mails (lus ou non)':'10 derniers mails non lus'}.\n`+
      'Réponds UNIQUEMENT avec un JSON valide, sans markdown :\n'+
      '{"emails":[{"id":"…","from_name":"…","from_email":"…","subject":"…","date":"…","snippet":"…"}]}\n'+
      'Si aucun mail : {"emails":[]}'
    );
    const emails=jx(raw,'emails');
    if(!emails) throw new Error('JSON invalide');
    S.emails=emails;S.idx=0;goList();
  }catch(e){
    lg('Load err: '+e.message);ring('err');
    speak("Désolé, je n'ai pas pu charger vos mails. Dites RÉESSAYER ou MENU.");
    S.screen='RETRY_LOAD';
  }
}

function goList(){
  S.screen='EMAIL_LIST';S.confusion=0;ring('listen');label('Vos mails');
  if(!S.emails.length){
    panel('Aucun mail','Boîte vide.');
    speak('Vous n\'avez aucun nouveau mail. Dites ANCIENS pour les mails déjà lus, ÉCRIRE pour rédiger un mail, ou MENU pour revenir.');
    return;
  }
  const rows=S.emails.map((e,i)=>
    `<div class="erow">
      <div class="enum">${i+1}</div>
      <div class="einfo">
        <div class="efrom">${esc(e.from_name||e.from_email)}</div>
        <div class="esubj">${esc(e.subject)}</div>
      </div>
    </div>`
  ).join('');
  id('panel').innerHTML=`<div class="ptag">Vos mails (${S.emails.length})</div>${rows}`;

  let ann=`Vous avez ${S.emails.length} mail${S.emails.length>1?'s':''}. `;
  S.emails.slice(0,5).forEach((e,i)=>ann+=`${ord(i+1)}, de ${e.from_name||'inconnu'}, objet : ${e.subject}. `);
  if(S.emails.length>5)ann+=`Et ${S.emails.length-5} autre${S.emails.length-5>1?'s':''} mail${S.emails.length-5>1?'s':''}. `;
  ann+=`Dites un numéro entre 1 et ${S.emails.length} pour écouter.`;
  speak(ann);
}

function hList(t){
  const k=extractNum(t);
  if(k&&k>=1&&k<=S.emails.length){S.confusion=0;return goReadEmail(k-1);}
  if(is(t,'ANCIENS'))  return goLoadEmails(true);
  if(is(t,'ECRIRE'))   return goComposeRecipient();
  if(is(t,'CHERCHER')) return goSearchQ();
  if(is(t,'RETOUR'))   return goMenu();
  confused(()=>speak(`Dites un numéro entre 1 et ${S.emails.length} pour écouter un mail, ANCIENS pour les mails déjà lus, ou MENU pour revenir.`));
}

async function goReadEmail(idx){
  S.idx=idx;S.screen='LOADING';ring('load');label('Lecture…');
  const meta=S.emails[idx];
  speak(`Je lis le mail de ${meta.from_name||meta.from_email}.`);
  try{
    const raw=await api(
      `Utilise l'outil Gmail pour lire le contenu complet du mail avec l'identifiant "${meta.id}".\n`+
      'Réponds UNIQUEMENT avec un JSON valide :\n'+
      '{"from_name":"…","from_email":"…","subject":"…","date":"…","body":"…"}\n'+
      'Le body doit être du texte brut, sans HTML.'
    );
    const m=jx(raw);
    if(!m)throw new Error('vide');
    S.mail={...meta,...m};
    panel('Lecture du mail',`De : ${m.from_name||m.from_email}\nObjet : ${m.subject}`);
    S.screen='READING_EMAIL';ring('speak');label('Lecture en cours');
    const body=cleanEmail(m.body);
    speak(
      `Mail de ${m.from_name||m.from_email}. `+
      `Date : ${m.date}. Objet : ${m.subject}. Message : ${body}`,
      ()=>{
        if(S.screen==='READING_EMAIL'){
          S.screen='EMAIL_ACTIONS';label('Actions disponibles');ring('listen');
          speak('Fin du mail. Dites RÉPONDRE pour répondre, SUIVANT pour le mail suivant, ou MENU pour revenir.');
        }
      }
    );
  }catch(e){
    lg('Read err: '+e.message);
    speak(`Impossible de lire ce mail en entier. Extrait : ${meta.snippet}. Dites SUIVANT ou MENU.`);
    S.screen='EMAIL_ACTIONS';
  }
}

function hReading(t){
  if(is(t,'STOP')||is(t,'SUITE')||is(t,'RETOUR')){
    stopTTS();S.screen='EMAIL_ACTIONS';label('Actions disponibles');ring('listen');
    speak('Lecture interrompue. Dites RÉPONDRE, SUIVANT, ou MENU.');
  }
}

function hActions(t){
  S.confusion=0;
  if(is(t,'REPONDRE')) return goReply();
  if(is(t,'SUITE'))    return goNextEmail();
  if(is(t,'RETOUR'))   return goMenu();
  if(is(t,'ECRIRE'))   return goComposeRecipient();
  confused(()=>speak('Dites RÉPONDRE pour répondre à ce mail, SUIVANT pour le mail suivant, ou MENU pour revenir au menu principal.'));
}

function goNextEmail(){
  if(S.idx+1<S.emails.length){goReadEmail(S.idx+1);}
  else{speak('Vous avez écouté votre dernier mail. Dites ANCIENS pour les mails précédents, ou MENU.');S.screen='EMAIL_LIST';}
}

function goReply(){
  const m=S.mail;
  S.compose={
    to:m.from_name||m.from_email,toEmail:m.from_email,
    subject:'Re : '+(m.subject||'').replace(/^Re\s*:\s*/i,''),
    body:'',replyId:S.emails[S.idx]?.id,
  };
  panel('Répondre',`À : ${S.compose.to}\nObjet suggéré : ${S.compose.subject}`);
  speak(`Je prépare une réponse à ${S.compose.to}. L'objet proposé est : ${S.compose.subject}. Dites l'objet, ou SUITE pour le garder.`);
  S.screen='COMPOSE_SUBJECT';label('Objet du mail');
}

/* =============================================================
   R É D A C T I O N
   ============================================================= */

function goComposeRecipient(){
  S.screen='COMPOSE_RECIPIENT';S.confusion=0;
  S.compose={to:'',toEmail:'',subject:'',body:'',replyId:null};
  label('Destinataire');panel('Nouveau mail','À qui voulez-vous écrire ?');
  speak('À qui voulez-vous écrire ? Dites le nom de la personne.');
}

async function hRecipient(t){
  if(is(t,'RETOUR'))return goMenu();
  if(!t||t.trim().length<2){return confused(()=>speak('Dites le nom de la personne à qui vous souhaitez écrire.'));}
  S.confusion=0;S.screen='LOADING';ring('load');label('Recherche…');
  speak(`Je cherche ${t} dans vos contacts.`);
  try{
    const raw=await api(
      `Dans Gmail, cherche les contacts dont le nom ressemble à "${t}".\n`+
      'Réponds UNIQUEMENT avec un JSON valide :\n'+
      '{"contacts":[{"name":"…","email":"…"}]}\n'+
      'Maximum 5 résultats. Si aucun : {"contacts":[]}'
    );
    const contacts=jx(raw,'contacts')||[];
    if(!contacts.length){
      if(t.includes('@')){S.compose.toEmail=t;S.compose.to=t;speak(`Je vais envoyer à ${t}. Quel est l'objet du mail ?`);return setTimeout(goComposeSubject,1500);}
      speak(`Aucun contact trouvé pour ${t}. Réessayez ou dites directement l'adresse e-mail.`);
      S.screen='COMPOSE_RECIPIENT';return;
    }
    if(contacts.length===1){
      S.compose.to=contacts[0].name;S.compose.toEmail=contacts[0].email;
      speak(`J'ai trouvé ${contacts[0].name}. Quel est l'objet du mail ?`);
      return setTimeout(goComposeSubject,1500);
    }
    // Désambiguïsation
    S.contacts=contacts;S.screen='CONTACT_DISAMBIG';S.confusion=0;
    let ann=`J'ai trouvé ${contacts.length} personnes : `;
    contacts.forEach((c,i)=>ann+=`${ord(i+1)}, ${c.name}. `);
    ann+='Dites le numéro ou le nom pour choisir.';
    panel('Plusieurs contacts',contacts.map((c,i)=>`${i+1}. ${c.name} — ${c.email}`).join('\n'));
    speak(ann);
  }catch(e){
    lg('Contacts err: '+e.message);
    S.compose.to=t;S.compose.toEmail='';
    speak(`Je vais écrire à ${t}. Quel est l'objet du mail ?`);
    setTimeout(goComposeSubject,1500);
  }
}

function hDisambig(t){
  const k=extractNum(t);
  if(k&&k>=1&&k<=S.contacts.length)return pickContact(S.contacts[k-1]);
  const nt=N(t);
  for(const c of S.contacts){
    const parts=c.name.split(' ');
    if(parts.some(p=>nt.includes(N(p))))return pickContact(c);
  }
  confused(()=>{
    let s='Je n\'ai pas reconnu ce nom. Rappel : ';
    S.contacts.forEach((c,i)=>s+=`${ord(i+1)}, ${c.name}. `);
    s+='Dites le numéro ou le nom.';
    speak(s);
  });
}

function pickContact(c){
  S.compose.to=c.name;S.compose.toEmail=c.email;S.confusion=0;
  S.screen='CONTACT_OPTIONS';label('Options contact');
  panel('Contact',`${c.name}\n${c.email}`);
  speak(`J'ai sélectionné ${c.name}. Voulez-vous SES MAILS, LUI ÉCRIRE, ou SON ADRESSE ?`);
}

function hContactOpts(t){
  if(is(t,'SES_MAILS')){
    speak(`Je cherche les mails de ${S.compose.to}.`);
    return goSearch('from:'+S.compose.toEmail);
  }
  if(is(t,'LUI_ECRIRE')){
    speak(`Je prépare un mail pour ${S.compose.to}.`);
    return setTimeout(goComposeSubject,1500);
  }
  if(is(t,'SON_ADRESSE')){
    speak(`L'adresse e-mail de ${S.compose.to} est : ${spellAddr(S.compose.toEmail)}.`,
          ()=>setTimeout(()=>speak('Dites SES MAILS, LUI ÉCRIRE, ou MENU.'),1000));
    return;
  }
  if(is(t,'RETOUR'))return goMenu();
  confused(()=>speak(`Pour ${S.compose.to} : dites SES MAILS pour voir ses mails, LUI ÉCRIRE pour rédiger, ou SON ADRESSE pour l'épeler.`));
}

function goComposeSubject(){
  S.screen='COMPOSE_SUBJECT';S.confusion=0;
  label('Objet du mail');
  panel('Nouveau mail',`À : ${S.compose.to}\nObjet : ?`);
  if(!S.talking)speak('Quel est l\'objet du mail ?');
}

function hSubject(t){
  if(is(t,'RETOUR'))return goMenu();
  // "suite" conserve l'objet suggéré (cas réponse)
  if(is(t,'SUITE')&&S.compose.subject){
    speak(`Objet conservé : ${S.compose.subject}. Dictez maintenant votre message. Dites TERMINÉ quand vous avez fini.`);
    return setTimeout(goComposeBody,100);
  }
  if(!t.trim()){return confused(()=>speak('Dites l\'objet de votre mail. Par exemple : Réunion de demain.'));}
  S.confusion=0;S.compose.subject=t;
  speak(`Objet : ${t}. Dictez maintenant votre message. Dites TERMINÉ quand vous avez fini.`);
  setTimeout(goComposeBody,100);
}

function goComposeBody(){
  S.screen='COMPOSE_BODY';S.confusion=0;
  label('Dictée du message');updateBodyPanel();
  if(!S.talking)speak('Je vous écoute. Dictez votre message et dites TERMINÉ quand vous avez fini.');
}

function updateBodyPanel(){
  panel('Message en cours',`À : ${S.compose.to}\nObjet : ${S.compose.subject}\n\n${S.compose.body||'[vide]'}`);
}

function hBody(t){
  // Pendant la dictée, QUITTER ne quitte pas — il annule le mail
  if(is(t,'TERMINER')){
    if(!S.compose.body.trim()){speak('Votre message est encore vide. Dictez au moins une phrase.');return;}
    speak('Message terminé. Je vous relis le mail complet avant envoi.');
    return setTimeout(goComposeConfirm,1800);
  }
  if(is(t,'RETOUR')||is(t,'QUITTER')){
    speak('Mail annulé. Retour au menu principal.');return setTimeout(goMenu,1500);
  }
  S.compose.body+=(S.compose.body?' ':'')+t;
  updateBodyPanel();
  speak('Compris. Continuez, ou dites TERMINÉ pour finir.');
}

function goComposeConfirm(){
  S.screen='COMPOSE_CONFIRM';S.confusion=0;label('Confirmation avant envoi');
  panel('Relecture avant envoi',`À : ${S.compose.to}\nObjet : ${S.compose.subject}\n\n${S.compose.body}`);
  speak(
    `Voici votre mail. Destinataire : ${S.compose.to}. `+
    `Objet : ${S.compose.subject}. `+
    `Message : ${S.compose.body}. `+
    'Dites OUI pour envoyer, ou NON pour annuler.'
  );
}

function hConfirm(t){
  if(is(t,'OUI'))return doSend();
  if(is(t,'NON')){speak('Mail annulé. Dites ÉCRIRE pour recommencer ou MENU pour revenir.');S.screen='MAIN_MENU';return;}
  confused(()=>speak('Dites OUI pour envoyer ce mail, ou NON pour l\'annuler.'));
}

async function doSend(){
  S.screen='LOADING';ring('load');label('Envoi en cours…');
  speak('J\'envoie votre mail.');
  const{to,toEmail,subject,body}=S.compose;
  try{
    await api(
      `Utilise l'outil Gmail pour envoyer ce mail :\n`+
      `Destinataire : "${toEmail||to}"\n`+
      `Objet : "${subject}"\n`+
      `Corps : "${body}"\n`+
      'Confirme avec : {"sent":true}'
    );
    ring('ok');label('Mail envoyé ✓');
    panel('Mail envoyé',`À : ${to}\nObjet : ${subject}`);
    speak(`Votre mail à ${to} a bien été envoyé. Dites LIRE, ÉCRIRE, ou MENU.`);
    S.screen='MAIN_MENU';
  }catch(e){
    lg('Send err: '+e.message);ring('err');label('Erreur d\'envoi');
    speak('L\'envoi a échoué. Dites OUI pour réessayer, ou NON pour annuler.');
    S.screen='RETRY_SEND';
  }
}

function hRetrySend(t){
  if(is(t,'OUI')||is(t,'REESSAYER'))return doSend();
  if(is(t,'NON')){speak('Mail annulé. Retour au menu.');return setTimeout(goMenu,1500);}
  confused(()=>speak('Dites OUI pour réessayer l\'envoi, ou NON pour annuler.'));
}

/* =============================================================
   R E C H E R C H E
   ============================================================= */

function goSearchQ(){
  S.screen='SEARCH_QUERY';S.confusion=0;
  label('Recherche');panel('Recherche','Que voulez-vous rechercher ?');
  speak('Que voulez-vous rechercher ? Dites un nom, un mot-clé, ou le nom d\'un expéditeur.');
}

function hSearchQ(t){
  if(is(t,'RETOUR'))return goMenu();
  if(!t||t.trim().length<2){return confused(()=>speak('Dites le nom ou le sujet à rechercher.'));}
  S.confusion=0;goSearch(t);
}

async function goSearch(query){
  S.screen='LOADING';ring('load');label('Recherche…');
  panel('Recherche',`"${query}"`);
  speak(`Je cherche : ${query}.`);
  try{
    const raw=await api(
      `Utilise l'outil Gmail pour chercher des mails correspondant à : "${query}".\n`+
      'Réponds UNIQUEMENT avec un JSON valide :\n'+
      '{"emails":[{"id":"…","from_name":"…","from_email":"…","subject":"…","date":"…","snippet":"…"}]}\n'+
      'Maximum 10 résultats. Si aucun : {"emails":[]}'
    );
    const emails=jx(raw,'emails')||[];
    S.emails=emails;S.idx=0;
    if(!emails.length){
      speak(`Aucun mail trouvé pour "${query}". Dites une nouvelle recherche ou MENU.`);
      S.screen='SEARCH_QUERY';label('Recherche');
      panel('Aucun résultat',`Recherche : "${query}"`);return;
    }
    S.screen='SEARCH_RESULTS';goList();
  }catch(e){
    lg('Search err: '+e.message);
    speak('La recherche a échoué. Dites MENU ou réessayez.');
    S.screen='SEARCH_QUERY';
  }
}

/* =============================================================
   A P I  A N T H R O P I C  +  G M A I L  M C P
   ============================================================= */

async function api(prompt){
  const res=await fetch(API_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:MODEL,max_tokens:1000,
      messages:[{role:'user',content:prompt}],
      mcp_servers:[{type:'url',url:GMAIL_MCP,name:'gmail'}],
    }),
  });
  if(!res.ok)throw new Error('HTTP '+res.status);
  const data=await res.json();
  const content=data.content||[];
  const texts=content.filter(b=>b.type==='text').map(b=>b.text);
  const results=content.filter(b=>b.type==='mcp_tool_result').map(b=>b.content?.[0]?.text||'');
  return[...texts,...results].join('\n');
}

/* Parse JSON depuis la réponse API */
function jx(raw,key){
  if(!raw)return null;
  try{
    let s=raw.replace(/```[\w]*\n?/g,'').replace(/```/g,'').trim();
    const a=s.indexOf('{'),b=s.lastIndexOf('}');
    if(a<0||b<0)return null;
    const obj=JSON.parse(s.slice(a,b+1));
    return key?(obj[key]??null):obj;
  }catch(e){lg('JSON err: '+e.message);return null;}
}

/* =============================================================
   U I  H E L P E R S
   ============================================================= */

function ring(mode){
  const r=id('ring');
  r.className='ring'+(mode&&mode!=='idle'?' '+mode:'');
  const ico={listen:'🎙️',speak:'🔊',load:'⌛',idle:'●',ok:'✓',err:'✗'};
  r.textContent=ico[mode]||'●';
}

function label(t){id('slabel').textContent=t;}

function panel(tag,body){
  id('panel').innerHTML=
    `<div class="ptag">${esc(tag)}</div>`+
    `<div class="pbody">${esc(body).replace(/\n/g,'<br>')}</div>`;
}

function lg(m){
  const l=id('logbox');
  const d=document.createElement('div');
  d.textContent=new Date().toLocaleTimeString()+' › '+m;
  l.appendChild(d);l.scrollTop=l.scrollHeight;
}

function id(s){return document.getElementById(s);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ── Raccourci clavier Espace ──────────────────────────────── */
document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();toggleMic();}});

/* ── Init ─────────────────────────────────────────────────── */
setTimeout(()=>{speechSynthesis.getVoices();},300);
lg('VocalMail v7.1 prêt.');
</script>
