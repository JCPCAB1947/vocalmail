<script>
// ============================================================
// VOCALMAIL v5 — Gestion vocale Gmail pour utilisateur aveugle
//
// Nouveautés v5 :
//  1. CARNET 3 SOURCES : Contacts Google + Autres contacts
//     (destinataires auto-enregistrés par Gmail) + expéditeurs
//     des 100 derniers mails reçus. Chargé au démarrage.
//  2. RECHERCHE FLOUE : tolérance aux approximations de la
//     reconnaissance vocale (distance d'édition, accents,
//     espaces parasites : "du pont" trouve "Dupont").
//  3. DESAMBIGUISATION : plusieurs "Marie" -> énumération
//     numérotée, choix par numéro ou nom complet.
//  4. LISTER LES CONTACTS : énumération vocale paginée par 20,
//     "suite" pour continuer, filtre par initiale possible.
//  5. Contacts sans nom (Autres contacts) : nom prononçable
//     fabriqué depuis l'adresse (docteur.bernard34@ ->
//     "docteur bernard").
//  + Acquis v4 : dictée continue, "terminé" pour finir.
// ============================================================

const CLIENT_ID = '391707883131-0ocsm9hgh35fl4u191o3c2gf58rp24jf.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/gmail.modify https://www.googleapis.com/auth/gmail.send https://www.googleapis.com/auth/contacts.readonly https://www.googleapis.com/auth/contacts.other.readonly';

const ORDRES_FIN_DICTEE = ['terminé', 'termine', 'fin du message', 'point final', 'fin de message', "j'ai fini", 'jai fini', "c'est fini", 'message terminé'];

// --- ETAT --------------------------------------------------------------------
let premierToucher     = true;
let connecte           = false;
let tokenAcces         = null;
let clientToken        = null;
let ecoute             = false;
let parle              = false;
let interrompu         = false;
let reconnaissance     = null;
let mailsEnCours       = [];
let indexEnCours       = 0;
let modeComposition    = false;
let modeDictee         = false;
let composition        = { a: '', aNom: '', objet: '', corps: '' };
let etapeComposition   = '';
let attendConfirmation = false;

// v5 : carnet = liste d'objets {nom, email, source, priorite}
let carnet             = [];
let carnetPret         = false;
let candidatsEnAttente = [];   // desambiguisation en cours
let listeContacts      = [];   // pagination "lister les contacts"
let listePage          = 0;

// --- ELEMENTS ------------------------------------------------------------------
const ecran        = document.getElementById('ecran');
const cercle       = document.getElementById('cercle');
const etatDiv      = document.getElementById('etat');
const transcDiv    = document.getElementById('transcription');
const boutonGoogle = document.getElementById('bouton-google');

// --- VOIX ------------------------------------------------------------------------
function dire(texte, suite) {
  interrompu = false;
  window.speechSynthesis.cancel();
  setTimeout(() => {
    const u = new SpeechSynthesisUtterance(texte);
    u.lang  = 'fr-FR';
    u.rate  = 1.0;
    u.pitch = 1.0;
    u.onstart = () => {
      parle = true;
      ecran.classList.add('parle');
      cercle.textContent = '🔊';
      etatDiv.textContent = texte.length > 200 ? texte.substring(0, 200) + '…' : texte;
    };
    u.onend = () => {
      parle = false;
      ecran.classList.remove('parle');
      cercle.textContent = modeDictee ? '✍️' : '🎤';
      if (suite && !interrompu) suite();
    };
    window.speechSynthesis.speak(u);
  }, 120);
}

function interrompreVoix() {
  interrompu = true;
  window.speechSynthesis.cancel();
  parle = false;
  ecran.classList.remove('parle');
  cercle.textContent = modeDictee ? '✍️' : '🎤';
}

// --- CONNEXION GOOGLE ---------------------------------------------------------------
function initGoogle() {
  if (!window.google || !google.accounts) {
    setTimeout(initGoogle, 300);
    return;
  }
  clientToken = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: (reponse) => {
      if (reponse && reponse.access_token) {
        tokenAcces = reponse.access_token;
        connecte = true;
        boutonGoogle.classList.remove('visible');
        chargerCarnetComplet();
        dire("Connexion réussie. Touchez l'écran et dites : mes mails, ou aide.");
      } else {
        dire("La connexion a échoué. Touchez le bouton pour réessayer.");
      }
    },
    error_callback: () => {
      dire("La connexion a été annulée. Touchez le bouton Se connecter avec Google pour réessayer.");
    }
  });
}

boutonGoogle.addEventListener('click', (e) => {
  e.stopPropagation();
  if (clientToken) {
    clientToken.requestAccessToken();
  } else {
    dire("Le service Google n'est pas encore chargé. Patientez deux secondes et réessayez.");
  }
});

// ============================================================
// CARNET DE CONTACTS — 3 SOURCES (v5)
// ============================================================

function normaliserNom(nom) {
  return (nom || '').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9\s]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

// Simplification phonetique pour la recherche floue : ph=f, doubles lettres, etc.
function phonetique(s) {
  return s
    .replace(/ph/g, 'f')
    .replace(/qu/g, 'k')
    .replace(/ch/g, 'ch')
    .replace(/([a-z])\1+/g, '$1')   // lettres doublees -> simples
    .replace(/y/g, 'i')
    .replace(/[eé]s?\b/g, 'e');
}

// Fabrique un nom prononcable depuis une adresse : docteur.bernard34@x.fr -> "docteur bernard"
function nomDepuisEmail(email) {
  const local = email.split('@')[0];
  return normaliserNom(local.replace(/[._\-+]/g, ' ').replace(/\d+/g, ' '));
}

function ajouterAuCarnet(nom, email, source, priorite) {
  if (!email || !email.includes('@')) return;
  email = email.toLowerCase().trim();
  let n = normaliserNom(nom);
  if (!n) n = nomDepuisEmail(email);
  if (!n) return;
  // Deja present avec meilleure priorite ? on garde le meilleur nom
  const existant = carnet.find(c => c.email === email);
  if (existant) {
    if (priorite < existant.priorite) {
      existant.nom = n;
      existant.priorite = priorite;
      existant.source = source;
    }
    return;
  }
  carnet.push({ nom: n, email: email, source: source, priorite: priorite });
}

async function chargerCarnetComplet() {
  carnet = [];
  await Promise.all([
    chargerContactsPrincipaux(),   // priorite 1
    chargerAutresContacts(),       // priorite 2
    chargerExpediteursRecents()    // priorite 3
  ]);
  carnetPret = true;
}

async function chargerContactsPrincipaux() {
  try {
    const r = await fetch('https://people.googleapis.com/v1/people/me/connections?personFields=names,emailAddresses&pageSize=1000', {
      headers: { 'Authorization': 'Bearer ' + tokenAcces }
    });
    if (!r.ok) return;
    const d = await r.json();
    (d.connections || []).forEach(p => {
      const email = p.emailAddresses && p.emailAddresses[0] && p.emailAddresses[0].value;
      const nom = p.names && p.names[0] && p.names[0].displayName;
      if (email) ajouterAuCarnet(nom, email, 'contacts', 1);
    });
  } catch (e) {}
}

async function chargerAutresContacts() {
  try {
    const r = await fetch('https://people.googleapis.com/v1/otherContacts?readMask=names,emailAddresses&pageSize=1000', {
      headers: { 'Authorization': 'Bearer ' + tokenAcces }
    });
    if (!r.ok) return;
    const d = await r.json();
    (d.otherContacts || []).forEach(p => {
      const email = p.emailAddresses && p.emailAddresses[0] && p.emailAddresses[0].value;
      const nom = p.names && p.names[0] && p.names[0].displayName;
      if (email) ajouterAuCarnet(nom, email, 'autres', 2);
    });
  } catch (e) {}
}

async function chargerExpediteursRecents() {
  try {
    const liste = await apiGmail('messages?maxResults=100&q=in:inbox');
    if (!liste.messages) return;
    // metadata seule (rapide) : on ne lit que l'entete From
    const lots = liste.messages.slice(0, 100);
    const details = await Promise.all(
      lots.map(m => apiGmail('messages/' + m.id + '?format=metadata&metadataHeaders=From').catch(() => null))
    );
    details.forEach(msg => {
      if (!msg) return;
      const de = extraireEntete(msg, 'From');
      if (!de) return;
      ajouterAuCarnet(nomExpediteur(de), emailExpediteur(de), 'recents', 3);
    });
  } catch (e) {}
}

// --- RECHERCHE FLOUE (v5) -----------------------------------------------------------

// Distance d'edition simple (Levenshtein) bornee
function distance(a, b) {
  if (Math.abs(a.length - b.length) > 3) return 99;
  const m = a.length, n = b.length;
  const d = Array.from({length: m+1}, (_, i) => [i, ...Array(n).fill(0)]);
  for (let j = 0; j <= n; j++) d[0][j] = j;
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      d[i][j] = Math.min(
        d[i-1][j] + 1,
        d[i][j-1] + 1,
        d[i-1][j-1] + (a[i-1] === b[j-1] ? 0 : 1)
      );
    }
  }
  return d[m][n];
}

// Cherche dans le carnet : retourne une liste de candidats tries par pertinence
function chercherContacts(nomDit) {
  const cle = normaliserNom(nomDit);
  if (!cle) return [];
  const cleCompacte = cle.replace(/\s/g, '');   // "du pont" -> "dupont"
  const resultats = [];

  for (const c of carnet) {
    const nomCompact = c.nom.replace(/\s/g, '');
    const motsNom = c.nom.split(' ');
    let score = 99;

    // exact complet
    if (c.nom === cle || nomCompact === cleCompacte) score = 0;
    // un mot du nom correspond exactement (prenom OU nom de famille)
    else if (motsNom.includes(cle) || motsNom.includes(cleCompacte)) score = 1;
    // le nom contient la cle ou l'inverse
    else if (c.nom.includes(cle) || cle.includes(c.nom) || nomCompact.includes(cleCompacte)) score = 2;
    // flou : distance <= 2 sur un des mots ou sur le nom compact,
    // apres simplification phonetique (ph=f, lettres doublees...)
    else {
      const cleFon = phonetique(cleCompacte);
      let meilleure = 99;
      for (const mot of motsNom) {
        meilleure = Math.min(meilleure,
          distance(mot, cleCompacte),
          distance(mot, cle),
          distance(phonetique(mot), cleFon));
      }
      meilleure = Math.min(meilleure,
        distance(nomCompact, cleCompacte),
        distance(phonetique(nomCompact), cleFon));
      if (meilleure <= 2) score = 3 + meilleure;
    }

    if (score < 99) {
      resultats.push({ ...c, score: score });
    }
  }

  // tri : score de correspondance, puis priorite de source
  resultats.sort((a, b) => (a.score - b.score) || (a.priorite - b.priorite));

  // dedoublonnage par email et par nom affiche
  const vus = new Set();
  const finaux = [];
  for (const r of resultats) {
    if (vus.has(r.email)) continue;
    vus.add(r.email);
    finaux.push(r);
    if (finaux.length >= 5) break;   // jamais plus de 5 propositions
  }

  // si le meilleur est nettement meilleur que les suivants, on ne garde que lui
  if (finaux.length > 1 && finaux[0].score === 0 && finaux[1].score >= 2) {
    return [finaux[0]];
  }
  // ne garder que les candidats du meme niveau que le meilleur (+1 de tolerance)
  return finaux.filter(f => f.score <= finaux[0].score + 1);
}

function prononcerNom(c) {
  return c.nom.split(' ').map(m => m.charAt(0).toUpperCase() + m.slice(1)).join(' ');
}

// --- API GMAIL -------------------------------------------------------------------------
async function apiGmail(chemin, options = {}) {
  const reponse = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/' + chemin, {
    ...options,
    headers: {
      'Authorization': 'Bearer ' + tokenAcces,
      'Content-Type': 'application/json',
      ...(options.headers || {})
    }
  });
  if (reponse.status === 401) {
    connecte = false;
    tokenAcces = null;
    boutonGoogle.classList.add('visible');
    throw new Error('SESSION_EXPIREE');
  }
  if (!reponse.ok) throw new Error('ERREUR_API_' + reponse.status);
  return reponse.json();
}

function decoderBase64(donnees) {
  try {
    return decodeURIComponent(escape(atob(donnees.replace(/-/g, '+').replace(/_/g, '/'))));
  } catch (e) { return ''; }
}

function extraireCorps(charge) {
  if (!charge) return '';
  if (charge.mimeType === 'text/plain' && charge.body && charge.body.data) {
    return decoderBase64(charge.body.data);
  }
  if (charge.parts) {
    for (const partie of charge.parts) {
      const texte = extraireCorps(partie);
      if (texte) return texte;
    }
  }
  if (charge.body && charge.body.data) {
    return decoderBase64(charge.body.data).replace(/<[^>]+>/g, ' ');
  }
  return '';
}

function nettoyerCorps(texte) {
  return texte
    .replace(/https?:\/\/\S+/g, ' lien ')
    .replace(/\r?\n{2,}/g, '. ')
    .replace(/\r?\n/g, ' ')
    .replace(/\s{2,}/g, ' ')
    .replace(/[_*#>|=-]{3,}/g, ' ')
    .trim()
    .substring(0, 1200);
}

function extraireEntete(message, nom) {
  const entetes = (message.payload && message.payload.headers) || [];
  const trouve = entetes.find(h => h.name.toLowerCase() === nom.toLowerCase());
  return trouve ? trouve.value : '';
}

function nomExpediteur(de) {
  const match = de.match(/^"?([^"<]+)"?\s*</);
  return match ? match[1].trim() : de.split('@')[0];
}

function emailExpediteur(de) {
  const match = de.match(/<([^>]+)>/);
  return match ? match[1] : de.trim();
}

function construireMail(msg) {
  const de = extraireEntete(msg, 'From');
  const nom = nomExpediteur(de);
  const email = emailExpediteur(de);
  ajouterAuCarnet(nom, email, 'recents', 3);
  return {
    id: msg.id,
    threadId: msg.threadId,
    de: nom,
    email: email,
    objet: extraireEntete(msg, 'Subject') || 'sans objet',
    corps: nettoyerCorps(extraireCorps(msg.payload)) || 'Le contenu de ce mail ne peut pas être lu à voix haute.',
    nonLu: (msg.labelIds || []).includes('UNREAD')
  };
}

async function chargerMails(requete, intro, limite) {
  dire("Je consulte votre boîte, un instant.");
  try {
    const n = limite || 10;
    const liste = await apiGmail('messages?maxResults=' + n + '&q=' + encodeURIComponent(requete || 'in:inbox'));
    if (!liste.messages || liste.messages.length === 0) {
      dire("Aucun mail trouvé.");
      return;
    }
    const details = await Promise.all(
      liste.messages.slice(0, n).map(m => apiGmail('messages/' + m.id + '?format=full'))
    );
    mailsEnCours = details.map(construireMail);
    indexEnCours = 0;
    dire(intro + ' ' + mailsEnCours.length + ' mail' + (mailsEnCours.length > 1 ? 's' : '') + '.', () => lireUnMail(mailsEnCours[0]));
  } catch (err) {
    if (err.message === 'SESSION_EXPIREE') {
      dire("Votre session a expiré. Touchez le bouton Se connecter avec Google.");
    } else {
      dire("Je n'arrive pas à joindre Gmail. Vérifiez la connexion internet et réessayez.");
    }
  }
}

async function marquerCommeLu(mail) {
  if (!mail.nonLu) return;
  try {
    await apiGmail('messages/' + mail.id + '/modify', {
      method: 'POST',
      body: JSON.stringify({ removeLabelIds: ['UNREAD'] })
    });
    mail.nonLu = false;
  } catch (e) {}
}

async function supprimerMail(mail) {
  await apiGmail('messages/' + mail.id + '/trash', { method: 'POST' });
}

async function envoyerMail(destinataire, objet, corps) {
  const brut =
    'To: ' + destinataire + '\r\n' +
    'Subject: =?UTF-8?B?' + btoa(unescape(encodeURIComponent(objet))) + '?=\r\n' +
    'Content-Type: text/plain; charset=UTF-8\r\n' +
    'Content-Transfer-Encoding: base64\r\n\r\n' +
    btoa(unescape(encodeURIComponent(corps)));
  const encode = btoa(brut).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  await apiGmail('messages/send', {
    method: 'POST',
    body: JSON.stringify({ raw: encode })
  });
}

// --- TOUCHER = LE SEUL GESTE -------------------------------------------------------
ecran.addEventListener('click', gererToucher);

function gererToucher() {
  if (premierToucher) {
    premierToucher = false;
    if (!connecte) {
      boutonGoogle.classList.add('visible');
      dire("Bienvenue dans VocalMail. Pour lire vos mails, il faut d'abord connecter votre compte Google. Touchez le bouton Se connecter avec Google au centre de l'écran.");
    }
    return;
  }

  if (parle) {
    interrompreVoix();
    if (connecte) demarrerEcoute();
    return;
  }

  if (!connecte) {
    dire("Vous n'êtes pas encore connecté. Touchez le bouton Se connecter avec Google.");
    return;
  }

  if (ecoute) { arreterEcoute(); } else { demarrerEcoute(); }
}

// --- MICRO --------------------------------------------------------------------------
function demarrerEcoute() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    dire("La reconnaissance vocale n'est pas disponible sur ce navigateur. Veuillez utiliser Safari ou Chrome.");
    return;
  }
  reconnaissance = new SR();
  reconnaissance.lang = 'fr-FR';
  reconnaissance.continuous = modeDictee;
  reconnaissance.interimResults = false;

  reconnaissance.onstart = () => {
    ecoute = true;
    if (modeDictee) {
      ecran.classList.add('dictee');
      cercle.textContent = '✍️';
      etatDiv.textContent = 'Dictée en cours… Dites TERMINÉ pour finir.';
    } else {
      ecran.classList.add('ecoute');
      cercle.textContent = '👂';
      etatDiv.textContent = 'Je vous écoute…';
    }
  };

  reconnaissance.onresult = (e) => {
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (!e.results[i].isFinal) continue;
      const brut = e.results[i][0].transcript.trim().toLowerCase();
      if (!brut) continue;
      transcDiv.textContent = '« ' + brut + ' »';

      if (modeDictee) {
        traiterDictee(brut);
      } else {
        arreterEcoute();
        traiterCommande(normaliser(brut));
        return;
      }
    }
  };

  reconnaissance.onerror = (e) => {
    if (modeDictee && (e.error === 'no-speech' || e.error === 'aborted')) {
      return;
    }
    arreterEcoute();
    if (e.error === 'no-speech') {
      dire("Je n'ai rien entendu. Touchez l'écran et parlez après le signal.");
    } else if (e.error === 'not-allowed') {
      dire("L'accès au microphone est refusé. Autorisez le micro dans les réglages du navigateur.");
    } else {
      dire("Je n'ai pas compris. Touchez l'écran et réessayez.");
    }
  };

  reconnaissance.onend = () => {
    if (modeDictee && !parle) {
      try { reconnaissance.start(); return; } catch (err) {
        setTimeout(() => { if (modeDictee) demarrerEcoute(); }, 300);
        return;
      }
    }
    arreterEcoute();
  };

  try { reconnaissance.start(); }
  catch(err) { arreterEcoute(); }
}

function arreterEcoute() {
  ecoute = false;
  if (reconnaissance) {
    reconnaissance.onend = null;
    try { reconnaissance.stop(); } catch(e) {}
    reconnaissance = null;
  }
  ecran.classList.remove('ecoute');
  ecran.classList.remove('dictee');
  if (!parle) cercle.textContent = '🎤';
}

// --- DICTEE CONTINUE --------------------------------------------------------------
function traiterDictee(brut) {
  let fin = false;
  let texte = brut;

  for (const ordre of ORDRES_FIN_DICTEE) {
    if (brut === ordre) { fin = true; texte = ''; break; }
    if (brut.endsWith(' ' + ordre)) {
      fin = true;
      texte = brut.slice(0, brut.length - ordre.length).trim();
      break;
    }
  }

  if (!fin && (brut === 'annuler' || brut === 'annule' || brut === 'annule tout')) {
    modeDictee = false;
    arreterEcoute();
    modeComposition = false;
    attendConfirmation = false;
    composition = { a: '', aNom: '', objet: '', corps: '' };
    etapeComposition = '';
    dire("D'accord, j'annule le mail en cours.");
    return;
  }

  if (texte) {
    composition.corps = composition.corps
      ? composition.corps + ' ' + texte
      : texte.charAt(0).toUpperCase() + texte.slice(1);
    etatDiv.textContent = 'Dictée : ' + composition.corps.length + ' caractères. Dites TERMINÉ pour finir.';
  }

  if (fin) {
    modeDictee = false;
    arreterEcoute();
    if (!composition.corps) {
      dire("Le message est vide. Dictez votre message après le signal, ou dites annuler.", () => { modeDictee = true; demarrerEcoute(); });
      etapeComposition = 'corps';
      return;
    }
    etapeComposition = '';
    attendConfirmation = true;
    dire("Fin de la dictée. Votre mail est prêt. À : " + composition.aNom + ". Objet : " + composition.objet + ". Message : " + composition.corps + ". Touchez l'écran et dites OUI pour envoyer, ou NON pour annuler.");
  }
}

// --- NORMALISATION ------------------------------------------------------------------
function normaliser(t) {
  return t
    .replace(/e-mails?/g, 'mail')
    .replace(/emails?/g, 'mail')
    .replace(/émails?/g, 'mail')
    .replace(/courriels?/g, 'mail')
    .replace(/mels?\b/g, 'mail')
    .replace(/messages?/g, 'mail');
}

// --- COMMANDES ---------------------------------------------------------------------------
function traiterCommande(cmd) {

  // ANNULER — prioritaire
  if (cmd.includes('annul') || cmd.includes('stop') || cmd.includes('laisse tomber')) {
    modeComposition = false;
    modeDictee = false;
    attendConfirmation = false;
    candidatsEnAttente = [];
    listeContacts = [];
    composition = { a: '', aNom: '', objet: '', corps: '' };
    etapeComposition = '';
    dire("D'accord. Que voulez-vous faire ?");
    return;
  }

  // DESAMBIGUISATION EN ATTENTE (choix parmi plusieurs contacts)
  if (candidatsEnAttente.length > 0) {
    traiterChoixContact(cmd);
    return;
  }

  // PAGINATION LISTE CONTACTS
  if (listeContacts.length > 0 && (cmd.includes('suite') || cmd.includes('continue'))) {
    lirePageContacts();
    return;
  }

  // CONFIRMATION ENVOI
  if (attendConfirmation) {
    if (cmd.includes('oui') || cmd.includes('confirme') || cmd.includes('envoi')) {
      attendConfirmation = false;
      dire("Envoi en cours.");
      envoyerMail(composition.a, composition.objet, composition.corps)
        .then(() => {
          const nom = composition.aNom || composition.a;
          modeComposition = false;
          composition = { a: '', aNom: '', objet: '', corps: '' };
          etapeComposition = '';
          dire("Mail envoyé à " + nom + ".");
        })
        .catch(() => {
          dire("L'envoi a échoué. Touchez l'écran et dites OUI pour réessayer, ou NON pour annuler.");
          attendConfirmation = true;
        });
    } else if (cmd.includes('non')) {
      attendConfirmation = false;
      modeComposition = false;
      composition = { a: '', aNom: '', objet: '', corps: '' };
      etapeComposition = '';
      dire("Envoi annulé. Le mail n'a pas été envoyé.");
    } else {
      dire("Dites OUI pour envoyer, ou NON pour annuler.");
    }
    return;
  }

  // MODE COMPOSITION (destinataire / objet)
  if (modeComposition) {
    traiterComposition(cmd);
    return;
  }

  // AIDE
  if (cmd.includes('aide') || cmd.includes('quoi dire') || cmd.includes('commande')) {
    dire("Voici les commandes. Mes mails. Mes trois derniers mails. Mes mails non lus. Mails de Marie. Écrire un mail à Marie. Lister les contacts. Suivant. Précédent. Répéter. Répondre. Supprimer. Pendant la dictée, dites TERMINÉ pour finir. Et annuler, à tout moment.");
    return;
  }

  // LISTER LES CONTACTS (v5) — teste AVANT la lecture des mails
  if (cmd.includes('liste') || cmd.includes('lister') ||
      cmd.startsWith('contact') || cmd.includes('mes contacts') || cmd.includes('les contacts') ||
      cmd.includes('carnet') || cmd.includes('adresse mail') || cmd.includes('adresses mail')) {
    // filtre par initiale : "contacts avec m" / "contacts qui commencent par m"
    const matchInitiale = cmd.match(/(?:avec|par|lettre)\s+([a-z])\b/);
    demarrerListeContacts(matchInitiale ? matchInitiale[1] : null);
    return;
  }

  // ECRIRE A [NOM]
  const matchEcrireA = cmd.match(/(?:écrire|ecrire|composer|rédiger|rediger|envoyer)\s+(?:un\s+)?mail\s+(?:à|a|pour)\s+([a-zà-öø-ÿ]+(?:\s+[a-zà-öø-ÿ]+)?)/i)
                    || cmd.match(/(?:écrire|ecrire)\s+(?:à|a)\s+([a-zà-öø-ÿ]+(?:\s+[a-zà-öø-ÿ]+)?)/i);
  if (matchEcrireA) {
    demarrerComposition(matchEcrireA[1].trim());
    return;
  }

  // ECRIRE (sans nom)
  if (cmd.includes('écrire') || cmd.includes('ecrire') || cmd.includes('composer') ||
      cmd.includes('rédiger') || cmd.includes('rediger') || cmd.includes('nouveau mail') ||
      cmd.includes('envoyer un mail')) {
    modeComposition = true;
    composition = { a: '', aNom: '', objet: '', corps: '' };
    etapeComposition = 'destinataire';
    dire("À qui voulez-vous écrire ? Touchez l'écran et dites le nom d'un de vos contacts. Ou dites annuler.");
    return;
  }

  // MES X DERNIERS MAILS
  const matchNombre = cmd.match(/(\d+|un|deux|trois|quatre|cinq|six|sept|huit|neuf|dix)\s+derniers?\s+mails?/);
  if (matchNombre) {
    const n = convertirNombre(matchNombre[1]);
    chargerMails('in:inbox', 'Voici vos derniers mails.', n);
    return;
  }

  // MAILS NON LUS
  if (cmd.includes('non lu') || cmd.includes('pas lu') || cmd.includes('nouveaux') || cmd.includes('nouveau')) {
    chargerMails('in:inbox is:unread', 'Mails non lus :');
    return;
  }

  // MAILS DE [NOM]
  const matchDe = cmd.match(/mails?\s+d[e']\s*([a-zà-öø-ÿ]+(?:\s+[a-zà-öø-ÿ]+)?)/i);
  if (matchDe) {
    const nom = matchDe[1].trim();
    chargerMails('in:inbox from:' + nom, 'Mails de ' + nom + ' :');
    return;
  }

  // TOUS LES MAILS
  if (cmd.includes('mes mails') || cmd.includes('ma boite') || cmd.includes('ma boîte') ||
      cmd.includes('tous les mails') || cmd.includes('toute la boite') || cmd.includes('toute la boîte') ||
      cmd.includes('lire les mails') || cmd.includes('lis les mails')) {
    chargerMails('in:inbox', 'Boîte de réception :');
    return;
  }

  // SUIVANT
  if (cmd.includes('suivant') || cmd.includes('prochain') || cmd.includes('après') || cmd.includes('apres')) {
    if (mailsEnCours.length === 0) { dire("Aucune liste en cours. Dites d'abord : mes mails."); return; }
    if (indexEnCours < mailsEnCours.length - 1) {
      indexEnCours++;
      lireUnMail(mailsEnCours[indexEnCours]);
    } else {
      dire("C'est le dernier mail de la liste.");
    }
    return;
  }

  // PRECEDENT
  if (cmd.includes('précédent') || cmd.includes('precedent') || cmd.includes('retour') || cmd.includes('reviens')) {
    if (mailsEnCours.length === 0) { dire("Aucune liste en cours. Dites d'abord : mes mails."); return; }
    if (indexEnCours > 0) {
      indexEnCours--;
      lireUnMail(mailsEnCours[indexEnCours]);
    } else {
      dire("C'est le premier mail de la liste.");
    }
    return;
  }

  // REPETER
  if (cmd.includes('répète') || cmd.includes('repete') || cmd.includes('répéter') ||
      cmd.includes('repeter') || cmd.includes('recommence') || cmd.includes('encore')) {
    if (mailsEnCours.length > 0 && mailsEnCours[indexEnCours]) {
      lireUnMail(mailsEnCours[indexEnCours]);
    } else {
      dire("Aucun mail en cours de lecture.");
    }
    return;
  }

  // REPONDRE
  if (cmd.includes('répond') || cmd.includes('repond') || cmd.includes('réponse') || cmd.includes('reponse')) {
    if (mailsEnCours.length === 0 || !mailsEnCours[indexEnCours]) {
      dire("Aucun mail sélectionné. Dites d'abord : mes mails.");
      return;
    }
    const m = mailsEnCours[indexEnCours];
    composition.a = m.email;
    composition.aNom = m.de;
    composition.objet = 'Re : ' + m.objet;
    composition.corps = '';
    modeComposition = true;
    modeDictee = true;
    etapeComposition = 'corps';
    dire("Réponse à " + m.de + ". Dictez votre message après le signal. Prenez votre temps, les pauses sont permises. Dites TERMINÉ quand vous avez fini.", () => demarrerEcoute());
    return;
  }

  // SUPPRIMER
  if (cmd.includes('supprim') || cmd.includes('efface') || cmd.includes('corbeille') || cmd.includes('poubelle')) {
    if (mailsEnCours.length === 0 || !mailsEnCours[indexEnCours]) {
      dire("Aucun mail sélectionné.");
      return;
    }
    const m = mailsEnCours[indexEnCours];
    dire("Suppression en cours.");
    supprimerMail(m)
      .then(() => {
        mailsEnCours.splice(indexEnCours, 1);
        if (indexEnCours >= mailsEnCours.length) indexEnCours = Math.max(0, mailsEnCours.length - 1);
        if (mailsEnCours.length > 0) {
          dire("Mail de " + m.de + " mis à la corbeille. Il reste " + mailsEnCours.length + " mail" + (mailsEnCours.length > 1 ? 's' : '') + ". Dites suivant pour continuer.");
        } else {
          dire("Mail de " + m.de + " mis à la corbeille. La liste est vide.");
        }
      })
      .catch(() => {
        dire("La suppression a échoué. Réessayez.");
      });
    return;
  }

  dire("Je n'ai pas compris. Dites aide pour connaître les commandes.");
}

// --- LISTER LES CONTACTS (v5) ----------------------------------------------------------
function demarrerListeContacts(initiale) {
  if (!carnetPret) {
    dire("Le carnet est encore en cours de chargement. Réessayez dans quelques secondes.");
    return;
  }
  let liste = [...carnet];
  if (initiale) {
    liste = liste.filter(c => c.nom.startsWith(initiale));
  }
  // tri alphabetique, contacts principaux en premier a nom egal
  liste.sort((a, b) => a.nom.localeCompare(b.nom) || (a.priorite - b.priorite));

  if (liste.length === 0) {
    dire(initiale
      ? "Aucun contact ne commence par la lettre " + initiale.toUpperCase() + "."
      : "Votre carnet est vide pour l'instant. Il se remplira automatiquement avec vos correspondants.");
    return;
  }

  listeContacts = liste;
  listePage = 0;
  const total = liste.length;
  dire("Vous avez " + total + " contact" + (total > 1 ? 's' : '') + (initiale ? " commençant par " + initiale.toUpperCase() : "") + ".", () => lirePageContacts());
}

function lirePageContacts() {
  const TAILLE = 20;
  const debut = listePage * TAILLE;
  const page = listeContacts.slice(debut, debut + TAILLE);
  if (page.length === 0) {
    dire("Fin de la liste.");
    listeContacts = [];
    listePage = 0;
    return;
  }
  const noms = page.map(prononcerNom).join('. ');
  listePage++;
  const resteApres = listeContacts.length - (debut + page.length);
  const suite = resteApres > 0
    ? " Il en reste " + resteApres + ". Dites SUITE pour continuer, ou STOP."
    : " Fin de la liste.";
  if (resteApres <= 0) { listeContacts = []; listePage = 0; }
  dire(noms + '.' + suite);
}

// --- COMPOSITION + DESAMBIGUISATION (v5) --------------------------------------------------
function demarrerComposition(nomDit) {
  if (!carnetPret) {
    dire("Le carnet de contacts est encore en cours de chargement. Réessayez dans quelques secondes.");
    return;
  }
  const candidats = chercherContacts(nomDit);

  if (candidats.length === 0) {
    dire("Je ne trouve pas " + nomDit + " dans vos contacts. Vérifiez le nom et réessayez. Si cette personne est nouvelle, demandez à un proche de l'ajouter dans vos contacts Google. Ensuite vous pourrez lui écrire par la voix.");
    return;
  }

  if (candidats.length === 1) {
    validerDestinataire(candidats[0]);
    return;
  }

  // plusieurs candidats : enumeration numerotee
  candidatsEnAttente = candidats;
  const options = candidats.map((c, i) => (i + 1) + '. ' + prononcerNom(c)).join('. ');
  dire("J'ai trouvé " + candidats.length + " contacts : " + options + ". Touchez l'écran et dites le numéro, ou le nom complet. Ou dites annuler.");
}

function traiterChoixContact(cmd) {
  const numeros = { 'un':1, '1':1, 'deux':2, '2':2, 'trois':3, '3':3, 'quatre':4, '4':4, 'cinq':5, '5':5 };
  let choisi = null;

  // par numero
  for (const [mot, n] of Object.entries(numeros)) {
    if (cmd === mot || cmd.startsWith(mot + ' ') || cmd.includes('numéro ' + mot) || cmd.includes('numero ' + mot)) {
      if (candidatsEnAttente[n - 1]) choisi = candidatsEnAttente[n - 1];
      break;
    }
  }

  // par nom
  if (!choisi) {
    const cle = normaliserNom(cmd);
    choisi = candidatsEnAttente.find(c => c.nom === cle)
          || candidatsEnAttente.find(c => c.nom.includes(cle) || cle.includes(c.nom));
  }

  if (!choisi) {
    const options = candidatsEnAttente.map((c, i) => (i + 1) + '. ' + prononcerNom(c)).join('. ');
    dire("Je n'ai pas compris votre choix. " + options + ". Dites le numéro, ou annuler.");
    return;
  }

  candidatsEnAttente = [];
  validerDestinataire(choisi);
}

function validerDestinataire(contact) {
  composition = { a: contact.email, aNom: prononcerNom(contact), objet: '', corps: '' };
  modeComposition = true;
  etapeComposition = 'objet';
  dire("Mail pour " + composition.aNom + ". Touchez l'écran et dites l'objet du mail.");
}

function traiterComposition(cmd) {
  if (etapeComposition === 'destinataire') {
    modeComposition = false;   // demarrerComposition reactivera si trouve
    demarrerComposition(cmd.trim());
  } else if (etapeComposition === 'objet') {
    composition.objet = cmd;
    etapeComposition = 'corps';
    modeDictee = true;
    dire("Objet : " + cmd + ". Dictez maintenant votre message après le signal. Prenez votre temps, les pauses sont permises. Dites TERMINÉ quand vous avez fini.", () => demarrerEcoute());
  }
}

// --- LECTURE -----------------------------------------------------------------------------------
function lireUnMail(mail) {
  if (!mail) { dire("Aucun mail à lire."); return; }
  marquerCommeLu(mail);
  const pos = "Mail " + (indexEnCours + 1) + " sur " + mailsEnCours.length + ".";
  const nouveau = mail.nonLu ? " Nouveau." : "";
  const texte = pos + nouveau + " De : " + mail.de + ". Objet : " + mail.objet + ". Message : " + mail.corps + " Touchez l'écran pour dire : suivant, répéter, répondre ou supprimer.";
  dire(texte);
}

// --- UTILITAIRE ----------------------------------------------------------------------------------
function convertirNombre(s) {
  const mots = { un:1, deux:2, trois:3, quatre:4, cinq:5, six:6, sept:7, huit:8, neuf:9, dix:10 };
  return mots[s] || parseInt(s) || 3;
}
