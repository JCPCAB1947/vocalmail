<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Test micro v3</title>
<style>
  body { background:#000; color:#fff; font-family:-apple-system,sans-serif;
         display:flex; flex-direction:column; align-items:center; justify-content:center;
         min-height:100vh; margin:0; text-align:center; }
  #status { font-size:34px; font-weight:bold; padding:20px; }
  #heard  { font-size:28px; color:#7fdc7f; padding:20px; min-height:80px; }
  #err    { font-size:30px; color:#ff7070; padding:20px; font-weight:bold; }
  #btn    { font-size:40px; padding:30px 60px; border-radius:20px; border:none;
            background:#fff; color:#000; font-weight:bold; }
  #ver    { position:fixed; bottom:20px; color:#888; font-size:24px; }
</style>
</head>
<body>
<div id="status">TEST MICRO v3</div>
<button id="btn">TOUCHER ICI</button>
<div id="heard"></div>
<div id="err"></div>
<div id="ver">v3</div>
<script>
const WORKER_URL = 'https://vocalmail-gmail.jc-penochetcab.workers.dev';
const _urlPin = new URLSearchParams(location.search).get('pin');
if (_urlPin) try { localStorage.setItem('vm_pin', _urlPin); } catch(e) {}
const PIN = _urlPin || (function(){ try { return localStorage.getItem('vm_pin') || ''; } catch(e) { return ''; } })();

/* Appel Worker au chargement */
fetch(WORKER_URL + '/emails?max=1', { headers: { 'X-Pin': PIN } })
  .then(r => r.json())
  .then(d => { document.getElementById('status').textContent = 'Worker OK — prêt'; })
  .catch(err => { document.getElementById('status').textContent = 'Worker : ' + err.message; });

/* TTS simple */
function dire(txt, apres) {
  const u = new SpeechSynthesisUtterance(txt);
  u.lang = 'fr-FR';
  if (apres) u.onend = apres;
  speechSynthesis.speak(u);
}

/* Micro — un seul listener, direct dans le bouton, rien d'autre */
document.getElementById('btn').addEventListener('click', () => {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { document.getElementById('err').textContent = 'API absente'; return; }

  const rec = new SR();
  rec.lang = 'fr-FR';
  rec.continuous = true;
  rec.interimResults = true;

  rec.onstart = () => {
    document.getElementById('btn').style.display = 'none';
    document.getElementById('status').textContent = 'MICRO OUVERT — PARLEZ';
    document.getElementById('status').style.color = '#7fdc7f';
    /* TTS après ouverture micro — micro reste ouvert */
    dire('Bonjour Philippe. Parlez maintenant.');
  };
  rec.onresult = e => {
    let txt = '';
    for (const r of e.results) txt += r[0].transcript + ' ';
    document.getElementById('heard').textContent = txt;
  };
  rec.onerror = e => {
    document.getElementById('err').textContent = 'ERREUR : ' + e.error;
    document.getElementById('status').style.color = '#ff7070';
  };
  rec.onend = () => {
    if (!document.getElementById('err').textContent)
      document.getElementById('status').textContent = 'MICRO FERMÉ';
  };

  try { rec.start(); } catch(ex) {
    document.getElementById('err').textContent = 'EXCEPTION : ' + ex.message;
  }
});
</script>
</body>
</html>
